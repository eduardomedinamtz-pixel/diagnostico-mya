<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagnóstico Laboral — Abogados MYA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2E5FA3;--blue-lt:#EAF1FB;
  --green:#1A7A45;--green-lt:#E8F6EE;--green-bd:#A3D4B5;
  --red:#B03025;--red-lt:#FDF0EF;--red-bd:#F0A89F;
  --amber:#96620A;--amber-lt:#FEF6E4;--amber-bd:#F5CE7A;
  --gray:#6B7280;--gray-lt:#F3F4F6;--border:#E2E4E9;
  --text:#111827;--sub:#6B7280;
  --sans:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --serif:'Georgia',serif;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)
}
body{font-family:var(--sans);background:#F7F8FA;color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

/* ── TOPBAR ── */
.topbar{background:var(--navy);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-inner{max-width:780px;margin:0 auto;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.topbar-brand{display:flex;flex-direction:column}
.topbar-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:.01em}
.topbar-sub{font-size:11px;color:#9CB8D8;margin-top:1px}
.topbar-link{font-size:11px;color:#9CB8D8;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap}
.topbar-link:hover{color:#fff}

/* ── PROGRESO GLOBAL ── */
.global-progress{background:var(--navy);border-top:1px solid rgba(255,255,255,.1);padding:0 20px 10px}
.gp-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:12px}
.gp-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.gp-fill{height:100%;background:#5B9CF6;border-radius:2px;transition:width .5s ease}
.gp-pct{font-size:11px;color:#9CB8D8;white-space:nowrap;min-width:32px;text-align:right}

/* ── BLOQUE NAV (tabs) ── */
.block-nav-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.block-nav-wrap::-webkit-scrollbar{display:none}
.block-nav{max-width:780px;margin:0 auto;padding:0 20px;display:flex;gap:0}
.bnav-btn{font-size:12px;font-weight:500;padding:12px 14px;border:none;background:transparent;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.bnav-btn:hover{color:var(--text)}
.bnav-btn.active{color:var(--navy);border-bottom-color:var(--navy)}
.bnav-btn.done{color:var(--green)}
.bnav-btn.warn{color:var(--red)}
.bnav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── MAIN LAYOUT ── */
.main{max-width:780px;margin:0 auto;padding:24px 20px 80px}

/* ── BLOCK HEADER ── */
.block-hd{margin-bottom:24px}
.block-hd-top{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.block-badge{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-lt);padding:3px 10px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.block-title{font-size:22px;font-weight:600;color:var(--navy)}
.block-desc{font-size:13px;color:var(--sub)}
.block-prog-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.block-prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.block-prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s}
.block-prog-label{font-size:11px;color:var(--sub);white-space:nowrap}

/* ── QUESTION CARD ── */
.q-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.q-card:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.08)}
.q-card.answered-si{border-color:var(--green-bd);background:var(--green-lt)}
.q-card.answered-no{border-color:var(--red-bd);background:var(--red-lt)}
.q-card.answered-parcial{border-color:var(--amber-bd);background:var(--amber-lt)}
.q-card.skipped{opacity:.4;pointer-events:none}

.q-card-body{padding:16px 20px 14px}
.q-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.q-num{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:3px 8px;border-radius:6px;white-space:nowrap;margin-top:2px;letter-spacing:.03em}
.q-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.55;flex:1}
.risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.risk-dot-A{background:var(--red)}
.risk-dot-M{background:var(--amber)}
.risk-dot-B{background:#A0AEC0}
.q-hint{font-size:12px;color:var(--sub);margin:0 0 12px 0;padding:8px 12px;background:rgba(0,0,0,.03);border-radius:6px;border-left:2px solid var(--border)}

/* Botones de respuesta */
.q-answers{display:flex;gap:8px;flex-wrap:wrap}
.ans-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px solid var(--border);border-radius:30px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);background:#fff;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ans-btn:hover{border-color:var(--blue);color:var(--navy);background:var(--blue-lt)}
.ans-btn.sel-si{background:var(--green-lt);border-color:var(--green);color:var(--green);font-weight:600}
.ans-btn.sel-no{background:var(--red-lt);border-color:var(--red);color:var(--red);font-weight:600}
.ans-btn.sel-parcial{background:var(--amber-lt);border-color:var(--amber);color:var(--amber);font-weight:600}
.ans-icon{font-size:15px;line-height:1}

/* Notas — solo aparecen si respuesta es No o Parcial */
.q-notes{padding:0 20px 14px;display:none}
.q-notes.visible{display:block}
.q-notes textarea{width:100%;font-family:var(--sans);font-size:13px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);resize:none;line-height:1.5;transition:border .15s;min-height:60px}
.q-notes textarea:focus{outline:none;border-color:var(--blue)}
.q-notes-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}

/* ── PREGUNTA ESPECIAL 1.1 — Persona ── */
.q-special{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;padding:16px 20px}
.q-special-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.persona-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.persona-card{padding:16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;text-align:center;background:#fff}
.persona-card:hover{border-color:var(--blue);background:var(--blue-lt)}
.persona-card.selected{border-color:var(--navy);background:var(--blue-lt)}
.persona-icon{font-size:28px;margin-bottom:8px;line-height:1}
.persona-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px}
.persona-sub{font-size:11px;color:var(--sub)}
.persona-card.selected .persona-title{color:var(--navy)}

/* ── PREGUNTA ESPECIAL 1.2 — Puestos ── */
.puestos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:4px}
.puesto-card{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;transition:border .15s}
.puesto-card:focus-within{border-color:var(--blue)}
.puesto-label{font-size:12px;font-weight:500;color:var(--text)}
.puesto-stepper{display:flex;align-items:center;gap:6px}
.st-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--gray);line-height:1;transition:all .15s;padding:0}
.st-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--navy)}
.st-val{font-size:14px;font-weight:700;color:var(--navy);min-width:20px;text-align:center}
.puestos-total{margin-top:12px;padding:10px 14px;background:var(--blue-lt);border-radius:8px;font-size:13px;color:var(--blue);font-weight:600;display:flex;justify-content:space-between}

/* ── SKIP NOTICE ── */
.skip-notice{background:#FFFBEB;border:1px solid #F5CE7A;border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.skip-notice-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.skip-notice-text{font-size:12px;color:#92600A;line-height:1.5}
.skip-notice-text strong{font-weight:700}

/* ── NAVEGACIÓN ── */
.nav-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 20px;z-index:50}
.nav-inner{max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
.nav-btn{font-size:14px;font-weight:500;padding:10px 22px;border-radius:8px;cursor:pointer;transition:all .15s;border:1.5px solid}
.nav-btn-sec{background:#fff;border-color:var(--border);color:var(--text)}
.nav-btn-sec:hover{background:var(--gray-lt)}
.nav-btn-sec:disabled{opacity:.3;cursor:not-allowed}
.nav-btn-pri{background:var(--navy);border-color:var(--navy);color:#fff}
.nav-btn-pri:hover{background:var(--blue)}
.nav-status{font-size:12px;color:var(--sub);text-align:center;line-height:1.4}
.nav-status strong{color:var(--text)}

/* ── RESUMEN ── */
.summary-wrap{display:flex;flex-direction:column;gap:16px}
.sum-hero{background:var(--navy);border-radius:var(--radius);padding:24px;color:#fff}
.sum-hero-title{font-size:18px;font-weight:600;margin-bottom:16px;color:#fff}
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:540px){.sum-stats{grid-template-columns:repeat(2,1fr)}}
.sum-stat{background:rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center}
.sum-stat-val{font-size:28px;font-weight:600;color:#fff;line-height:1}
.sum-stat-val.red{color:#FCA5A5}
.sum-stat-val.amber{color:#FCD34D}
.sum-stat-val.green{color:#6EE7B7}
.sum-stat-label{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sum-card-hd{padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center}
.semaforo-list{padding:0}
.sem-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .1s}
.sem-row:last-child{border-bottom:none}
.sem-row:hover{background:var(--gray-lt)}
.sem-blk{flex:1;font-size:13px;color:var(--text)}
.sem-blk-num{font-size:11px;color:var(--sub);margin-bottom:1px}
.sem-count{font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap}
.sem-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;letter-spacing:.04em}
.sem-badge-A{background:var(--red-lt);color:var(--red)}
.sem-badge-M{background:var(--amber-lt);color:var(--amber)}
.sem-badge-B{background:var(--green-lt);color:var(--green)}
.sem-badge-none{background:var(--gray-lt);color:var(--gray)}
.issue-list{padding:0}
.issue-row{padding:12px 20px;border-bottom:1px solid #F5F5F5;display:flex;gap:12px;align-items:flex-start}
.issue-row:last-child{border-bottom:none}
.issue-badge-A{font-size:10px;font-weight:700;color:var(--red);background:var(--red-lt);padding:2px 8px;border-radius:6px;white-space:nowrap;margin-top:2px}
.issue-badge-M{font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-lt);padding:2px 8px;border-radius:6px;white-space:nowrap;margin-top:2px}
.issue-body{flex:1}
.issue-id{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:2px}
.issue-txt{font-size:13px;color:var(--text);line-height:1.45}
.issue-note-txt{font-size:11px;color:var(--sub);margin-top:3px;font-style:italic}
.doc-list{padding:12px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:500px){.doc-list{grid-template-columns:1fr}}
.doc-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:border .15s;background:#fff}
.doc-item:hover{border-color:var(--blue)}
.doc-item.checked{border-color:var(--green-bd);background:var(--green-lt)}
.doc-item input{accent-color:var(--green);cursor:pointer;width:14px;height:14px;flex-shrink:0}
.doc-label{cursor:pointer;line-height:1.3}
.sum-notes-area{padding:16px 20px}
.sum-notes-area textarea{width:100%;font-family:var(--sans);font-size:13px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--gray-lt);color:var(--text);resize:vertical;min-height:100px;line-height:1.6;transition:border .15s}
.sum-notes-area textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.sum-actions{display:flex;gap:10px;padding:0 20px 16px;flex-wrap:wrap}
.sum-action-btn{font-size:13px;font-weight:500;padding:9px 18px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:all .15s}
.sum-action-print{background:#fff;border-color:var(--border);color:var(--text)}
.sum-action-print:hover{background:var(--gray-lt)}
.sum-action-restart{background:var(--navy);border-color:var(--navy);color:#fff}
.sum-action-restart:hover{background:var(--blue)}

/* sin contratos banner */
.no-contracts-banner{background:#FEF3C7;border:1px solid #F5CE7A;border-radius:8px;padding:14px 18px;display:flex;gap:12px}
.ncb-icon{font-size:22px;flex-shrink:0}
.ncb-body h4{font-size:14px;font-weight:700;color:#92600A;margin-bottom:3px}
.ncb-body p{font-size:13px;color:#92600A;line-height:1.5}

@media(max-width:600px){
  .persona-opts{grid-template-columns:1fr}
  .bnav-btn span.bnav-label{display:none}
}
@media print{
  .topbar,.block-nav-wrap,.nav-footer,.sum-actions{display:none!important}
  body{background:#fff}
  .main{padding:10px}
  .q-card{break-inside:avoid;page-break-inside:avoid}
}
.persona-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:500px){.persona-fields{grid-template-columns:1fr}}
.pf-group{display:flex;flex-direction:column;gap:5px}
.pf-group.full{grid-column:1/-1}
.pf-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em}
.pf-input{font-family:var(--sans);font-size:13px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);transition:border .15s,box-shadow .15s;width:100%}
.pf-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.08)}
.st-num-input{width:44px;text-align:center;font-family:var(--sans);font-size:14px;font-weight:700;color:var(--navy);border:1.5px solid var(--border);border-radius:6px;padding:3px 4px;background:#fff;-moz-appearance:textfield}
.st-num-input::-webkit-inner-spin-button,.st-num-input::-webkit-outer-spin-button{-webkit-appearance:none}
.st-num-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(46,95,163,.1)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <div class="topbar-name">Abogados MYA</div>
      <div class="topbar-sub">Diagnóstico Laboral · Restaurante-Bar</div>
    </div>
    <a class="topbar-link" href="https://finiquito-laboral.netlify.app">
      ← Calculadora de Finiquito
    </a>
  </div>
  <div class="global-progress">
    <div class="gp-inner">
      <div class="gp-bar"><div class="gp-fill" id="gp-fill" style="width:0%"></div></div>
      <div class="gp-pct" id="gp-pct">0%</div>
    </div>
  </div>
</div>

<div class="block-nav-wrap">
  <div class="block-nav" id="block-nav"></div>
</div>

<main class="main" id="main"></main>

<div class="nav-footer">
  <div class="nav-inner">
    <button class="nav-btn nav-btn-sec" id="btn-prev" onclick="goBlock(curBlock-1)">← Anterior</button>
    <div class="nav-status" id="nav-status"></div>
    <button class="nav-btn nav-btn-pri" id="btn-next" onclick="navNext()">Siguiente →</button>
  </div>
</div>

<script>
// ── DATOS ─────────────────────────────────────────────────────────────────
const PUESTOS=[
  {id:'hostess',n:'Hostess / Recepcionista'},
  {id:'mesero',n:'Mesero / Mesera'},
  {id:'chef',n:'Chef / Jefe de Cocina'},
  {id:'cocinero',n:'Cocinero / Cocinera'},
  {id:'barman',n:'Barman / Bartender'},
  {id:'cajero',n:'Cajero / Cajera'},
  {id:'limpieza',n:'Limpieza'},
  {id:'gerente',n:'Gerente / Encargado'},
  {id:'temporada',n:'Personal de Temporada'},
  {id:'otro',n:'Otro puesto'},
];

const BLOCKS=[
{id:1,title:"Datos generales",desc:"Información básica del negocio y su estructura de personal",
qs:[
{id:"1.1",t:"¿Bajo qué figura jurídica opera el patrón?",tipo:"persona",r:"B"},
{id:"1.2",t:"¿Cuántas personas trabajan actualmente en el establecimiento?",tipo:"puestos",r:"B",h:"Indique el número por puesto. Esto dimensiona las obligaciones y la paquetería necesaria."},
{id:"1.3",t:"¿Cuenta con registro patronal vigente ante el IMSS?",r:"A",h:"Sin registro patronal no existe base para cumplir las obligaciones de seguridad social."},
{id:"1.4",t:"¿Tiene licencia de funcionamiento y permiso de venta de alcohol vigentes?",r:"A",h:"Su ausencia agrava el riesgo en inspecciones conjuntas de la STPS y la Cofepris."},
{id:"1.5",t:"¿Tiene definida formalmente la estructura de puestos del establecimiento?",r:"B"},
{id:"1.6",t:"¿Hay más de un turno de trabajo operando simultáneamente o de forma rotatoria?",r:"B"},
{id:"1.7",t:"¿Ha recibido visitas de inspección de la STPS, IMSS o Cofepris en los últimos 3 años?",r:"M",h:"Anote los resultados y las observaciones que le hayan dejado."},
{id:"1.8",t:"¿Existe algún juicio o procedimiento laboral activo en este momento?",r:"A",h:"Incluye demandas, procedimientos de conciliación y amparos laborales."},
]},
{id:2,title:"Contratos de trabajo",desc:"Existencia, tipo y contenido de los contratos individuales — Art. 25 LFT",
qs:[
{id:"2.1",t:"¿Todo el personal activo tiene contrato individual de trabajo por escrito?",r:"A",h:"Sin contrato escrito la ley presume las condiciones más favorables al trabajador. Es la contingencia más frecuente.",pivote:true},
{id:"2.2",t:"¿Los contratos establecen el tipo correcto de relación: tiempo indeterminado, temporada o determinado, según la función real del puesto?",r:"A",h:"Un contrato a plazo fijo para una función permanente es nulo y revierte automáticamente a tiempo indeterminado.",depende:"2.1"},
{id:"2.3",t:"¿Los contratos contienen todos los datos mínimos del Art. 25 LFT: nombre, CURP, RFC, NSS, puesto, jornada, salario, lugar y día de pago?",r:"A",depende:"2.1"},
{id:"2.4",t:"¿Los contratos de meseros, barman y hostess incluyen cláusula de propinas con el componente de integración para el SDI ante el IMSS?",r:"A",h:"Sin esta cláusula el salario diario integrado está subdeclarado ante el IMSS en todos esos puestos.",depende:"2.1"},
{id:"2.5",t:"¿Los contratos del chef y del personal de confianza incluyen cláusula de confidencialidad con vigencia posterior al término de la relación laboral?",r:"A",depende:"2.1"},
{id:"2.6",t:"¿El contrato del cajero regula expresamente la responsabilidad por valores y prohíbe descuentos sin soporte documental?",r:"A",h:"Sin esta cláusula cualquier descuento por faltantes es potencialmente ilegal.",depende:"2.1"},
{id:"2.7",t:"¿Los contratos regulan el uso de herramientas tecnológicas del establecimiento: WhatsApp institucional, POS, plataformas de reservaciones?",r:"M",depende:"2.1"},
{id:"2.8",t:"¿Los contratos del personal de temporada están tipificados como contratos por temporada (discontinuos) y no como contratos a tiempo determinado?",r:"A",depende:"2.1"},
{id:"2.9",t:"¿Cada trabajador tiene un ejemplar firmado de su contrato, y el patrón conserva el acuse de recibo en el expediente?",r:"M",depende:"2.1"},

  "Expedientes personales completos",
  "Reglamento Interior de Trabajo",
  "Actas de constitución de comisiones (5 actas)",
  "Depósito del RIT ante el CFCRL",

  "Formato de reporte de violencia y acoso",

];

// ── ESTADO ────────────────────────────────────────────────────────────────
let curBlock = 0;
const ans = {};          // { qId: 'si'|'no'|'parcial' }
const notes = {};
const puestos = {};      // { puestoId: numero }
let personaTipo = '';
let personaData = {nombre:'', rfc:'', regimen:''};  // campos estructurados 1.1
let docChecks = {};
let finalNotes = '';

const TOTAL_BLOCKS = BLOCKS.length + 1; // +1 para resumen

// ── HELPERS ───────────────────────────────────────────────────────────────
function isSkipped(q){
  return q.depende && ans[q.depende]==='no';
}
function answeredCount(){
  let n = 0;
  BLOCKS.forEach(b=>{
    b.qs.forEach(q=>{
      if(q.tipo==='persona' && personaTipo) n++;
      else if(q.tipo==='puestos' && totalPuestos()>0) n++;
      else if(!q.tipo && !isSkipped(q) && ans[q.id]) n++;
    });
  });
  return n;
}
function totalQsVisible(){
  let n=0;
  BLOCKS.forEach(b=>b.qs.forEach(q=>{
    if(!isSkipped(q)) n++;
  }));
  return n;
}
function totalPuestos(){
  return Object.values(puestos).reduce((s,v)=>s+(parseInt(v)||0),0);
}
function blockAnsweredCount(b){
  return b.qs.filter(q=>{
    if(isSkipped(q)) return true;
    if(q.tipo==='persona') return !!personaTipo;
    if(q.tipo==='puestos') return totalPuestos()>0;
    return !!ans[q.id];
  }).length;
}
function blockRisk(b){
  const hasHighIssue=b.qs.some(q=>!isSkipped(q)&&(ans[q.id]==='no'||ans[q.id]==='parcial')&&q.r==='A');
  const midCount=b.qs.filter(q=>!isSkipped(q)&&(ans[q.id]==='no'||ans[q.id]==='parcial')&&q.r==='M').length;
  if(hasHighIssue) return 'A';
  if(midCount>1) return 'M';
  if(!b.qs.some(q=>ans[q.id]||q.tipo)) return null;
  return 'B';
}
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── RENDER BARRA Y NAV ────────────────────────────────────────────────────
function updateTopbar(){
  const ac=answeredCount();
  const tot=totalQsVisible();
  const pct=tot>0?Math.round((ac/tot)*100):0;
  document.getElementById('gp-fill').style.width=pct+'%';
  document.getElementById('gp-pct').textContent=pct+'%';
}

function renderBlockNav(){
  const nav=document.getElementById('block-nav');
  let html='';
  BLOCKS.forEach((b,i)=>{
    const r=blockRisk(b);
    const done=blockAnsweredCount(b)===b.qs.length;
    let cls='bnav-btn';
    if(curBlock===i) cls+=' active';
    else if(r==='A') cls+=' warn';
    else if(done) cls+=' done';
    const dotColor=r==='A'?'var(--red)':r==='M'?'var(--amber)':done?'var(--green)':'transparent';
    html+=`<button class="${cls}" onclick="goBlock(${i})">
      <span class="bnav-dot" style="background:${done||r?dotColor:'transparent'}"></span>
      <span class="bnav-label">${b.id}. ${b.title}</span>
    </button>`;
  });
  html+=`<button class="bnav-btn${curBlock===BLOCKS.length?' active':''}" onclick="goBlock(${BLOCKS.length})">
    <span class="bnav-dot"></span>
    <span class="bnav-label">Diagnóstico</span>
  </button>`;
  nav.innerHTML=html;
  // scroll active into view
  const activeBtn=nav.querySelector('.active');
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest',inline:'center'});
}

function updateNav(){
  const isSummary=curBlock===BLOCKS.length;
  const prev=document.getElementById('btn-prev');
  const next=document.getElementById('btn-next');
  const status=document.getElementById('nav-status');
  prev.disabled=curBlock===0;
  if(isSummary){
    next.textContent='Reiniciar';
    next.onclick=()=>{ if(confirm('¿Reiniciar el diagnóstico?')){location.reload();} };
  } else {
    next.textContent='Siguiente →';
    next.onclick=()=>navNext();
  }
  if(!isSummary){
    const b=BLOCKS[curBlock];
    const ac=blockAnsweredCount(b);
    status.innerHTML=`<strong>${b.title}</strong><br>Bloque ${b.id} de ${BLOCKS.length}`;
  } else {
    status.innerHTML=`<strong>Diagnóstico final</strong>`;
  }
}

function navNext(){
  if(curBlock<BLOCKS.length) goBlock(curBlock+1);
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────
function render(){
  renderBlockNav();
  updateNav();
  updateTopbar();
  const main=document.getElementById('main');
  if(curBlock===BLOCKS.length){
    main.innerHTML=renderSummary();
  } else {
    main.innerHTML=renderBlock(BLOCKS[curBlock]);
  }
  // resize textareas
  main.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
}

function renderBlock(b){
  const bAns=blockAnsweredCount(b);
  const bTot=b.qs.length;
  const bPct=Math.round((bAns/bTot)*100);
  const skipActive=b.id===2&&ans['2.1']==='no';
  const skipCount=skipActive?b.qs.filter(q=>q.depende==='2.1').length:0;

  let html=`
  <div class="block-hd">
    <div class="block-hd-top">
      <span class="block-badge">Bloque ${b.id}</span>
    </div>
    <div class="block-title">${esc(b.title)}</div>
    <div class="block-desc">${esc(b.desc)}</div>
    <div class="block-prog-row">
      <div class="block-prog-bar"><div class="block-prog-fill" style="width:${bPct}%"></div></div>
      <div class="block-prog-label">${bAns} / ${bTot} respondidas</div>
    </div>
  </div>`;

  if(skipActive){
    html+=`<div class="skip-notice">
      <span class="skip-notice-icon">⚠️</span>
      <div class="skip-notice-text"><strong>Las preguntas 2.2 a 2.10 se omiten</strong> porque no hay contratos escritos. Esto constituye por sí solo la contingencia de mayor prioridad: elaborar contratos individuales para cada puesto activo.</div>
    </div>`;
  }

  b.qs.forEach(q=>{
    if(q.tipo==='persona'){html+=renderPersonaQ(q);return;}
    if(q.tipo==='puestos'){html+=renderPuestosQ(q);return;}
    html+=renderQ(q);
  });
  return html;
}

function renderQ(q){
  const skipped=isSkipped(q);
  const v=ans[q.id]||'';
  const cardClass='q-card'+(skipped?' skipped':v?' answered-'+v:'');
  const showNotes=(v==='no'||v==='parcial')&&!skipped;

  const icons={si:'✓',no:'✗',parcial:'~'};
  const labels={si:'Sí',no:'No',parcial:'Parcial'};

  let btns='';
  ['si','no','parcial'].forEach(opt=>{
    const sel=v===opt;
    btns+=`<button class="ans-btn${sel?' sel-'+opt:''}" onclick="setAns('${q.id}','${opt}')">
      <span class="ans-icon">${icons[opt]}</span> ${labels[opt]}
    </button>`;
  });

  return`<div class="${cardClass}" id="qcard-${q.id}">
    <div class="q-card-body">
      <div class="q-header">
        <span class="q-num">${esc(q.id)}</span>
        <span class="q-text">${esc(q.t)}</span>
        <span class="risk-dot risk-dot-${q.r}" title="Riesgo ${q.r==='A'?'Alto':q.r==='M'?'Medio':'Bajo'}"></span>
      </div>
      ${q.h&&!skipped?`<div class="q-hint">${esc(q.h)}</div>`:''}
      ${skipped?`<div class="q-hint" style="border-left-color:var(--amber-bd);background:var(--amber-lt);color:var(--amber)">Omitida — no aplica sin contratos escritos</div>`:''}
      ${!skipped?`<div class="q-answers">${btns}</div>`:''}
    </div>
    <div class="q-notes${showNotes?' visible':''}" id="qnotes-${q.id}">
      <div class="q-notes-label">Notas / detalle</div>
      <textarea placeholder="Anote aquí los detalles relevantes para el expediente..." 
        onchange="setNote('${q.id}',this.value)" oninput="autoResize(this)">${esc(notes[q.id]||'')}</textarea>
    </div>
  </div>`;
}

  const pf=personaTipo==='pf';
  return`<div class="q-special" id="qcard-1.1">
    <div class="q-special-header">
      <span class="q-num">${esc(q.id)}</span>
      <span class="q-text">${esc(q.t)}</span>
      <span class="risk-dot risk-dot-${q.r}"></span>
    </div>
    <div class="persona-opts">
      <div class="persona-card${pm?' selected':''}" onclick="setPersona('pm')">
        <div class="persona-icon">🏢</div>
        <div class="persona-title">Persona Moral</div>
        <div class="persona-sub">Sociedad, SA de CV, SRL, AC, etc.</div>
      </div>
      <div class="persona-card${pf?' selected':''}" onclick="setPersona('pf')">
        <div class="persona-icon">👤</div>
        <div class="persona-title">Persona Física</div>
        <div class="persona-sub">Con Actividad Empresarial</div>
      </div>
    </div>
    <div class="persona-fields">
      <div class="pf-group full">
        <label class="pf-label">${pm?'Denominación o razón social':'Nombre completo del patrón'}</label>
        <input class="pf-input" type="text"
          placeholder="${pm?'Ej. Restaurantes del Centro SA de CV':'Ej. Juan Pérez García'}"
          value="${esc(personaData.nombre)}"
          oninput="setPersonaField('nombre',this.value)">
      </div>
      <div class="pf-group">
        <label class="pf-label">RFC</label>
        <input class="pf-input" type="text"
          placeholder="${pm?'Ej. RCE850301ABC':'Ej. PEGJ850301XYZ'}"

          style="text-transform:uppercase;letter-spacing:.05em"
          oninput="setPersonaField('rfc',this.value.toUpperCase())">
      </div>
      <div class="pf-group">
        <label class="pf-label">Régimen fiscal (SAT)</label>
        <input class="pf-input" type="text"
          placeholder="Ej. General de Ley, RESICO, RIF..."
          value="${esc(personaData.regimen)}"
          oninput="setPersonaField('regimen',this.value)">
      </div>
      ${pm?`<div class="pf-group full">
        <label class="pf-label">Representante legal</label>

          placeholder="Nombre completo del apoderado o representante"
          value="${esc(personaData.representante||'')}"
          oninput="setPersonaField('representante',this.value)">
      </div>`:''}
    </div>
  </div>`;
}

function renderPuestosQ(q){
  let cards='';
  PUESTOS.forEach(p=>{
    const v=puestos[p.id]||0;
    cards+=`<div class="puesto-card">
      <span class="puesto-label">${esc(p.n)}</span>
      <div class="puesto-stepper">
        <button class="st-btn" onclick="adjPuesto('${p.id}',-1)" type="button">−</button>
        <input class="st-num-input" type="number" id="pv-${p.id}" min="0" max="99" value="${v}"
          oninput="setPuestoVal('${p.id}',this.value)">
        <button class="st-btn" onclick="adjPuesto('${p.id}',1)" type="button">+</button>
      </div>
    </div>`;
  });
  const tot=totalPuestos();
  return`<div class="q-special" id="qcard-1.2">
    <div class="q-special-header">
      <span class="q-num">${esc(q.id)}</span>
      <span class="q-text">${esc(q.t)}</span>
      <span class="risk-dot risk-dot-${q.r}"></span>
    </div>
    ${q.h?`<div class="q-hint">${esc(q.h)}</div>`:''}
    <div class="puestos-grid">${cards}</div>
    <div class="puestos-total" id="puestos-total">
      <span>Total de personas en plantilla</span>
      <span id="puestos-total-num">${tot} persona${tot!==1?'s':''}</span>
    </div>
  </div>`;
}

// ── RESUMEN ───────────────────────────────────────────────────────────────
function renderSummary(){
  const allQs=BLOCKS.flatMap(b=>b.qs).filter(q=>!q.tipo&&!isSkipped(q));
  const issues=allQs.filter(q=>ans[q.id]==='no'||ans[q.id]==='parcial');
  const highIssues=issues.filter(q=>q.r==='A');
  const midIssues=issues.filter(q=>q.r==='M');
  const sinContratos=ans['2.1']==='no';
  const ic=issues.length;
  const hr=highIssues.length;

  let html=`<div class="summary-wrap">
    <div class="sum-hero">
      <div class="sum-hero-title">Diagnóstico de cumplimiento laboral</div>
      <div class="sum-stats">
        <div class="sum-stat"><div class="sum-stat-val">${answeredCount()}</div><div class="sum-stat-label">Preguntas atendidas</div></div>
        <div class="sum-stat"><div class="sum-stat-val ${ic>0?'red':''}">${ic}</div><div class="sum-stat-label">Incumplimientos</div></div>
        <div class="sum-stat"><div class="sum-stat-val ${hr>0?'red':''}">${hr}</div><div class="sum-stat-label">Riesgo ALTO</div></div>
        <div class="sum-stat"><div class="sum-stat-val ${midIssues.length>0?'amber':''}">${midIssues.length}</div><div class="sum-stat-label">Riesgo MEDIO</div></div>
      </div>
    </div>`;

  if(sinContratos){
    html+=`<div class="no-contracts-banner">
      <div class="ncb-icon">⚠️</div>
      <div class="ncb-body">
        <h4>Personal sin contrato escrito — máxima prioridad</h4>
        <p>Las preguntas 2.2 a 2.10 fueron omitidas por no existir contratos. Elaborar contratos individuales para cada puesto activo es la primera acción del plan de trabajo, antes que cualquier otro documento.</p>
      </div>
    </div>`;
  }

  // Semáforo
  html+=`<div class="sum-card">
    <div class="sum-card-hd">Semáforo por bloque <span style="font-size:11px;font-weight:400">Clic para ir al bloque</span></div>
    <div class="semaforo-list">`;
  BLOCKS.forEach((b,i)=>{
    const r=blockRisk(b);
    const bi=b.qs.filter(q=>!isSkipped(q)&&(ans[q.id]==='no'||ans[q.id]==='parcial')).length;
    const vis=b.qs.filter(q=>!isSkipped(q)).length;
    html+=`<div class="sem-row" onclick="goBlock(${i})">
      <div class="sem-blk">
        <div class="sem-blk-num">Bloque ${b.id}</div>
        <div>${esc(b.title)}</div>
      </div>
      <div class="sem-count">${bi>0?`${bi} problema${bi>1?'s':''}`:''}</div>
      <span class="sem-badge ${r?'sem-badge-'+r:'sem-badge-none'}">${r?{A:'ALTO',M:'MEDIO',B:'BAJO'}[r]:'Sin responder'}</span>
    </div>`;
  });
  html+=`</div></div>`;

  // Contingencias ALTO
  if(highIssues.length>0){
    html+=`<div class="sum-card">
      <div class="sum-card-hd" style="color:var(--red)">Contingencias de atención inmediata — Riesgo ALTO</div>
      <div class="issue-list">`;
    highIssues.forEach(q=>{
      html+=`<div class="issue-row">
        <div class="issue-badge-A">ALTO</div>
        <div class="issue-body">
          <div class="issue-id">${esc(q.id)}</div>
          <div class="issue-txt">${esc(q.t)}</div>
          ${notes[q.id]?`<div class="issue-note-txt">↳ ${esc(notes[q.id])}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Contingencias MEDIO
  if(midIssues.length>0){
    html+=`<div class="sum-card">
      <div class="sum-card-hd" style="color:var(--amber)">Contingencias de seguimiento — Riesgo MEDIO</div>
      <div class="issue-list">`;
    midIssues.forEach(q=>{
      html+=`<div class="issue-row">
        <div class="issue-badge-M">MEDIO</div>
        <div class="issue-body">
          <div class="issue-id">${esc(q.id)}</div>
          <div class="issue-txt">${esc(q.t)}</div>
          ${notes[q.id]?`<div class="issue-note-txt">↳ ${esc(notes[q.id])}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Paquetería
  html+=`<div class="sum-card">
    <div class="sum-card-hd">Paquetería necesaria</div>
    <div class="doc-list">`;
  DOCS.forEach((d,i)=>{
    const chk=docChecks[i]||false;
    html+=`<label class="doc-item${chk?' checked':''}">
      <input type="checkbox" ${chk?'checked':''} onchange="setDoc(${i},this.checked)">
      <span class="doc-label">${esc(d)}</span>
    </label>`;
  });
  html+=`</div></div>`;

  // Notas finales
  html+=`<div class="sum-card">
    <div class="sum-card-hd">Observaciones y estrategia — uso exclusivo del despacho</div>
    <div class="sum-notes-area">
      <textarea placeholder="Contingencia más urgente · Estrategia de atención · Honorarios estimados · Fecha de inicio de trabajos..."
        onchange="finalNotes=this.value" oninput="autoResize(this)">${esc(finalNotes)}</textarea>
    </div>
    <div class="sum-actions">
      <button class="sum-action-btn sum-action-print" onclick="window.print()">🖨 Imprimir / Guardar PDF</button>
      <button class="sum-action-btn sum-action-restart" onclick="if(confirm('¿Reiniciar el diagnóstico?')){location.reload();}">Nuevo diagnóstico</button>
    </div>
  </div>
  </div>`;
  return html;
}

// ── ACCIONES ──────────────────────────────────────────────────────────────

function goBlock(i){
  curBlock=Math.max(0,Math.min(BLOCKS.length,i));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Respuesta Sí/No/Parcial — manipulación quirúrgica, SIN re-render del bloque
function setAns(id,val){
  ans[id]=val;

  if(id==='2.1'){
    // Solo para el pivote necesitamos actualizar el contenido del bloque
    // (aparece/desaparece el banner y las preguntas dependientes)
    // Guardamos posición de scroll y la restauramos
    const sy=window.scrollY;
    renderBlockNav();
    updateNav();
    updateTopbar();
    const main=document.getElementById('main');
    main.innerHTML=renderBlock(BLOCKS[curBlock]);
    main.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    window.scrollTo({top:sy});
    return;
  }

  // Para todas las demás preguntas: solo tocamos la tarjeta afectada
  const card=document.getElementById('qcard-'+id);
  if(!card) return;

  // 1. Color de fondo de la tarjeta
  card.className='q-card answered-'+val;

  // 2. Estado de los botones de respuesta
  const btnMap={si:0,no:1,parcial:2};
  card.querySelectorAll('.ans-btn').forEach((btn,i)=>{
    btn.className='ans-btn'+(i===btnMap[val]?' sel-'+val:'');
  });

  // 3. Mostrar u ocultar el área de notas
  const notesDiv=document.getElementById('qnotes-'+id);
  if(notesDiv){
    if(val==='no'||val==='parcial') notesDiv.classList.add('visible');
    else notesDiv.classList.remove('visible');
  }

  updateTopbar();
  renderBlockNav();
}

function setNote(id,val){notes[id]=val;}

function setDoc(i,val){
  docChecks[i]=val;
  const allDocs=document.querySelectorAll('.doc-item');
  if(allDocs[i]) allDocs[i].classList.toggle('checked',val);
}

// Persona jurídica — solo actualiza la tarjeta 1.1 in-place
function setPersonaField(field,val){
  personaData[field]=val;
  updateTopbar();
  renderBlockNav();
}

function setPersona(tipo){
  personaTipo=tipo;
  const card=document.getElementById('qcard-1.1');
  if(card){
    const q=BLOCKS[0].qs.find(q=>q.id==='1.1');
    const tmp=document.createElement('div');
    tmp.innerHTML=renderPersonaQ(q);
    card.replaceWith(tmp.firstElementChild);
  }
  updateTopbar();
  renderBlockNav();
}

// Steppers de puestos — botones +/- y escritura directa, sin re-render
function adjPuesto(id,delta){
  puestos[id]=Math.max(0,(parseInt(document.getElementById('pv-'+id).value)||0)+delta);
  document.getElementById('pv-'+id).value=puestos[id];
  _updatePuestosTotal();
}

function setPuestoVal(id,val){
  const n=Math.max(0,parseInt(val)||0);
  puestos[id]=n;
  // corregir el input si el usuario escribe algo inválido
  const el=document.getElementById('pv-'+id);
  if(el&&el.value!==String(n)) el.value=n;
  _updatePuestosTotal();
}

function _updatePuestosTotal(){
  const tot=totalPuestos();
  const el=document.getElementById('puestos-total-num');
  if(el) el.textContent=`${tot} persona${tot!==1?'s':''}`;
  updateTopbar();
  renderBlockNav();
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

// ── INICIO ────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>

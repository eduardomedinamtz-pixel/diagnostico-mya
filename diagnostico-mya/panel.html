<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel de Registros — Medina & Alatorre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root { --dark:#051226; --blue:#004AC7; --gray:#667587; --off:#F0F0F0; --light:#E8F0FD; --border:#dce3ed; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Raleway',system-ui,sans-serif; background:#f4f7fb; min-height:100vh; color:#111; }

/* LOGIN */
#login {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:var(--dark);
}
.login-card {
  background:white; border-radius:12px; padding:40px 36px;
  width:100%; max-width:360px; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.login-card h2 { font-family:'DM Serif Text',serif; font-size:22px; color:var(--dark); margin-bottom:4px; }
.login-card p  { font-size:12px; color:var(--gray); margin-bottom:24px; }
.login-card input {
  width:100%; border:1px solid var(--border); border-radius:6px;
  padding:10px 14px; font-size:14px; font-family:'Raleway',sans-serif;
  margin-bottom:12px; outline:none;
}
.login-card input:focus { border-color:var(--blue); }
.login-card button {
  width:100%; background:var(--blue); color:white; border:none;
  border-radius:6px; padding:11px; font-size:14px; font-weight:700;
  font-family:'Raleway',sans-serif; cursor:pointer;
}
.login-card button:hover { background:#0040b0; }
.login-error { font-size:12px; color:#c00; margin-top:8px; display:none; }

/* PANEL */
#panel { display:none; }

.header {
  background:linear-gradient(120deg,#051226 0%,#0a2353 55%,#004AC7 100%);
  padding:0;
}
.header-inner {
  max-width:1100px; margin:0 auto;
  padding:18px 24px; display:flex; justify-content:space-between; align-items:center;
}
.header h1 { font-family:'DM Serif Text',serif; font-size:20px; color:var(--off); font-weight:400; }
.header .brand { font-family:'DM Serif Text',serif; font-size:13px; color:var(--off); text-align:right; }
.header .brand span { display:block; font-family:'Raleway',sans-serif; font-size:9px; color:var(--gray); letter-spacing:.15em; text-transform:uppercase; }

.container { max-width:1100px; margin:0 auto; padding:24px 20px; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card {
  background:white; border:1px solid var(--border); border-radius:8px;
  padding:16px 18px; border-top:3px solid var(--blue);
}
.stat-card .num { font-size:28px; font-weight:700; color:var(--dark); font-family:'DM Serif Text',serif; }
.stat-card .lbl { font-size:11px; color:var(--gray); margin-top:2px; }

/* FILTROS */
.filtros {
  display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center;
}
.filtros select, .filtros input {
  border:1px solid var(--border); border-radius:6px; padding:7px 12px;
  font-size:12px; font-family:'Raleway',sans-serif; outline:none; background:white;
}
.filtros select:focus, .filtros input:focus { border-color:var(--blue); }
.btn-refresh {
  background:var(--blue); color:white; border:none; border-radius:6px;
  padding:7px 16px; font-size:12px; font-weight:700; font-family:'Raleway',sans-serif;
  cursor:pointer; margin-left:auto;
}
.btn-refresh:hover { background:#0040b0; }

/* TABLA */
.tabla-wrap { background:white; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th {
  background:var(--dark); color:var(--off); padding:10px 12px;
  text-align:left; font-size:11px; font-weight:600; letter-spacing:.04em;
}
tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
tbody tr:hover { background:#f8fafc; }
tbody td { padding:10px 12px; vertical-align:top; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:700;
}
.badge-diag { background:#E8F0FD; color:var(--blue); }
.badge-finq { background:#EDF7ED; color:#166534; }
.badge-alto { background:#FFE7E7; color:#C00000; }
.badge-medio { background:#FFF3E0; color:#C55A00; }
.badge-ok { background:#EDF7ED; color:#166534; }

/* DETALLE */
.btn-ver {
  background:none; border:1px solid var(--blue); border-radius:4px;
  padding:3px 10px; font-size:11px; color:var(--blue); cursor:pointer;
  font-family:'Raleway',sans-serif; font-weight:600;
}
.btn-ver:hover { background:var(--light); }

/* MODAL */
#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
  z-index:1000; align-items:center; justify-content:center;
}
#modal-overlay.open { display:flex; }
.modal {
  background:white; border-radius:10px; width:90%; max-width:640px;
  max-height:85vh; overflow-y:auto; padding:24px;
}
.modal h3 { font-family:'DM Serif Text',serif; font-size:18px; color:var(--dark); margin-bottom:16px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 20px; }
.modal-fila { padding:5px 0; border-bottom:1px solid #f3f4f6; }
.modal-fila .k { font-size:10px; color:var(--gray); }
.modal-fila .v { font-size:12px; font-weight:600; color:#111; margin-top:1px; }
.modal-close {
  float:right; background:none; border:none; font-size:20px;
  cursor:pointer; color:var(--gray); line-height:1;
}
.empty { text-align:center; padding:40px; color:var(--gray); font-size:14px; }

@media(max-width:600px) {
  .modal-grid { grid-template-columns:1fr; }
  thead th:nth-child(n+4) { display:none; }
  tbody td:nth-child(n+4) { display:none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h2>Panel de Registros</h2>
    <p>Medina &amp; Alatorre Abogados</p>
    <input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')acceder()"/>
    <button onclick="acceder()">Acceder</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="header">
    <div class="header-inner">
      <h1>Panel de Registros</h1>
      <div class="brand">Medina <span style="display:inline;font-style:italic;color:rgba(240,240,240,0.6)">&</span> Alatorre
        <span>Abogados</span>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">—</div>
        <div class="lbl">Total registros</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statDiag">—</div>
        <div class="lbl">Diagnósticos</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statFinq">—</div>
        <div class="lbl">Finiquitos calculados</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statHoy">—</div>
        <div class="lbl">Hoy</div>
      </div>
    </div>

    <div class="filtros">
      <select id="filtroTipo" onchange="filtrar()">
        <option value="todos">Todos los registros</option>
        <option value="diagnosticos">Solo diagnósticos</option>
        <option value="finiquitos">Solo finiquitos</option>
      </select>
      <input type="text" id="filtroBusca" placeholder="Buscar empresa o trabajador..." oninput="filtrar()"/>
      <button class="btn-refresh" onclick="cargar()">↻ Actualizar</button>
    </div>

    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Empresa / Trabajador</th>
            <th>Detalle</th>
            <th>Riesgo / Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr><td colspan="6" class="empty">Cargando registros...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <h3 id="modal-title">Detalle</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
var PWD_OK = '';
var todos_registros = [];

function acceder() {
  var pwd = document.getElementById('pwd').value;
  fetch('/.netlify/functions/listar-registros?pwd=' + encodeURIComponent(pwd) + '&tipo=todos')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        PWD_OK = pwd;
        document.getElementById('login').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        todos_registros = data.registros || [];
        renderizar(todos_registros);
        actualizarStats(todos_registros);
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    })
    .catch(function() {
      document.getElementById('loginError').style.display = 'block';
    });
}

function cargar() {
  var tipo = document.getElementById('filtroTipo').value;
  fetch('/.netlify/functions/listar-registros?pwd=' + encodeURIComponent(PWD_OK) + '&tipo=' + tipo)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        todos_registros = data.registros || [];
        filtrar();
        actualizarStats(todos_registros);
      }
    });
}

function actualizarStats(regs) {
  var hoy = new Date().toDateString();
  document.getElementById('statTotal').textContent = regs.length;
  document.getElementById('statDiag').textContent = regs.filter(function(r){return r.tipo==='diagnostico';}).length;
  document.getElementById('statFinq').textContent = regs.filter(function(r){return r.tipo==='finiquito';}).length;
  document.getElementById('statHoy').textContent  = regs.filter(function(r){return new Date(r.fecha).toDateString()===hoy;}).length;
}

function filtrar() {
  var tipo  = document.getElementById('filtroTipo').value;
  var busca = document.getElementById('filtroBusca').value.toLowerCase();
  var filtrados = todos_registros.filter(function(r) {
    if (tipo !== 'todos' && r.tipo !== tipo.slice(0,-1)) return false;
    var nombre = (r.empresa || r.trabajador || '').toLowerCase();
    return !busca || nombre.includes(busca);
  });
  renderizar(filtrados);
}

function fmt(n) {
  return '$' + (+n).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtFecha(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function renderizar(regs) {
  var tbody = document.getElementById('tablaBody');
  if (!regs.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Sin registros</td></tr>';
    return;
  }
  tbody.innerHTML = regs.map(function(r) {
    var esDiag = r.tipo === 'diagnostico';
    var badge  = esDiag
      ? '<span class="badge badge-diag">Diagnóstico</span>'
      : '<span class="badge badge-finq">Finiquito</span>';
    var nombre = esDiag ? (r.empresa || '—') : (r.trabajador || '—');
    var sub    = esDiag ? (r.responsable || '') : (r.patron || '');
    var detalle, riesgoTotal;

    if (esDiag) {
      var dm = parseInt(r.demanda_laboral) || 0;
      var cl = parseInt(r.cumplimiento_laboral) || 0;
      var nivel = dm >= 4 || cl <= 2 ? 'alto' : dm >= 3 ? 'medio' : 'ok';
      var labelN = nivel === 'alto' ? '🔴 Urgente' : nivel === 'medio' ? '🟡 Medio' : '🟢 Normal';
      detalle = r.num_trabajadores || '—';
      riesgoTotal = '<span class="badge badge-' + nivel + '">' + labelN + '</span>';
    } else {
      detalle = (r.anos || 0) + ' años · ' + fmt(r.sd || 0) + '/día';
      riesgoTotal = '<strong style="color:#004AC7">' + fmt(r.grandTotal || 0) + '</strong>';
    }

    return '<tr>'
      + '<td>' + badge + '</td>'
      + '<td style="color:#667587;font-size:11px">' + fmtFecha(r.fecha) + '</td>'
      + '<td><strong>' + nombre + '</strong>' + (sub ? '<br/><span style="font-size:10px;color:#667587">' + sub + '</span>' : '') + '</td>'
      + '<td style="color:#667587">' + detalle + '</td>'
      + '<td>' + riesgoTotal + '</td>'
      + '<td><button class="btn-ver" onclick="verDetalle(\'' + r.id + '\')">Ver</button></td>'
      + '</tr>';
  }).join('');
}

function verDetalle(id) {
  var r = todos_registros.find(function(x){return x.id===id;});
  if (!r) return;
  var esDiag = r.tipo === 'diagnostico';
  document.getElementById('modal-title').textContent = esDiag
    ? ('Diagnóstico — ' + (r.empresa || '—'))
    : ('Finiquito — ' + (r.trabajador || '—'));

  var campos;
  if (esDiag) {
    campos = [
      ['Empresa', r.empresa], ['Responsable', r.responsable],
      ['Teléfono', r.telefono], ['Correo', r.correo],
      ['Fecha', fmtFecha(r.fecha)], ['Giro', r.giro],
      ['Núm. trabajadores', r.num_trabajadores], ['IMSS real', r.imss_real],
      ['Contratos', r.contratos], ['Aviso privacidad', r.aviso_privacidad],
      ['Demanda laboral (1-5)', r.demanda_laboral], ['Cumplimiento (1-5)', r.cumplimiento_laboral],
      ['Urgencia privacidad (1-5)', r.urgencia_privacidad], ['Pref. contacto', r.preferencia_contacto],
      ['Preocupación principal', r.preocupacion],
    ];
  } else {
    campos = [
      ['Trabajador', r.trabajador], ['Patrón', r.patron],
      ['Fecha ingreso', r.ingreso], ['Fecha baja', r.baja],
      ['Causa', r.causa], ['Antigüedad', (r.anos||0)+' años, '+(r.meses||0)+' meses'],
      ['SD', fmt(r.sd)], ['SDI', fmt(r.sdi)],
      ['FI', (+r.fi||0).toFixed(6)], ['Subtotal finiquito', fmt(r.finiqSub)],
      ['Subtotal indemnización', fmt(r.indemSub)], ['Gratificación', fmt(r.gratSub||0)],
      ['TOTAL A PAGAR', fmt(r.grandTotal)], ['Exento ISR', fmt(r.exentoISR||0)],
      ['Gravable ISR', fmt(r.gravableISR||0)], ['Fecha guardado', fmtFecha(r.fecha)],
    ];
  }

  var html = '<div class="modal-grid">';
  campos.forEach(function(par) {
    html += '<div class="modal-fila"><div class="k">' + par[0] + '</div><div class="v">' + (par[1]||'—') + '</div></div>';
  });
  html += '</div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
</script>
</body>
</html>

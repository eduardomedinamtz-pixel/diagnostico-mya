<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagnóstico Laboral — Abogados MYA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2E5FA3;--blue-lt:#EAF1FB;
  --green:#1A7A45;--green-lt:#E8F6EE;--green-bd:#A3D4B5;
  --red:#B03025;--red-lt:#FDF0EF;--red-bd:#F0A89F;
  --amber:#96620A;--amber-lt:#FEF6E4;--amber-bd:#F5CE7A;
  --gray:#6B7280;--gray-lt:#F3F4F6;--border:#E2E4E9;
  --text:#111827;--sub:#6B7280;
  --sans:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --radius:12px
}
body{font-family:var(--sans);background:#F7F8FA;color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
/* TOPBAR */
.topbar{background:var(--navy);position:sticky;top:0;z-index:100}
.topbar-inner{max-width:780px;margin:0 auto;padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.topbar-name{font-size:13px;font-weight:600;color:#fff}
.topbar-sub{font-size:11px;color:#9CB8D8;margin-top:1px}
.topbar-link{font-size:11px;color:#9CB8D8;text-decoration:none}
.topbar-link:hover{color:#fff}
.gp-wrap{max-width:780px;margin:0 auto;padding:0 20px 8px;display:flex;align-items:center;gap:10px}
.gp-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.gp-fill{height:100%;background:#5B9CF6;border-radius:2px;transition:width .4s}
.gp-pct{font-size:11px;color:#9CB8D8;min-width:28px;text-align:right}
/* BLOCK TABS */
.tabs-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{max-width:780px;margin:0 auto;padding:0 20px;display:flex}
.tab{font-size:12px;font-weight:500;padding:12px 13px;border:none;background:transparent;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab.done{color:var(--green)}
.tab.warn{color:var(--red)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:transparent}
/* MAIN */
.main{max-width:780px;margin:0 auto;padding:24px 20px 90px}
/* BLOCK PANEL — oculto por defecto */
.block-panel{display:none}
.block-panel.active{display:block}
/* BLOCK HEADER */
.blk-hd{margin-bottom:22px}
.blk-badge{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-lt);padding:3px 10px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.blk-title{font-size:21px;font-weight:600;color:var(--navy);margin:6px 0 3px}
.blk-desc{font-size:13px;color:var(--sub);margin-bottom:10px}
.blk-prog-row{display:flex;align-items:center;gap:10px}
.blk-prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.blk-prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.blk-prog-lbl{font-size:11px;color:var(--sub);white-space:nowrap}
/* QUESTION CARD */
.q-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;transition:border-color .2s}
.q-card.si{border-color:var(--green-bd);background:var(--green-lt)}
.q-card.no{border-color:var(--red-bd);background:var(--red-lt)}
.q-card.parcial{border-color:var(--amber-bd);background:var(--amber-lt)}
.q-card.skipped{opacity:.4;pointer-events:none}
.q-body{padding:15px 18px 13px}
.q-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.q-num{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.q-txt{font-size:14px;font-weight:500;color:var(--text);line-height:1.5;flex:1}
.risk{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.risk-A{background:var(--red)}.risk-M{background:var(--amber)}.risk-B{background:#A0AEC0}
.q-hint{font-size:12px;color:var(--sub);padding:7px 11px;background:rgba(0,0,0,.03);border-left:2px solid var(--border);border-radius:4px;margin-bottom:11px}
.q-hint.skip-hint{border-left-color:var(--amber-bd);background:var(--amber-lt);color:var(--amber)}
/* ANSWER BUTTONS */
.ans-row{display:flex;gap:7px;flex-wrap:wrap}
.ans{border:1.5px solid var(--border);border-radius:30px;padding:8px 16px;font-size:13px;font-weight:500;color:var(--gray);background:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.ans:hover{border-color:var(--blue);color:var(--navy);background:var(--blue-lt)}
.ans.si{background:var(--green-lt);border-color:var(--green);color:var(--green);font-weight:600}
.ans.no{background:var(--red-lt);border-color:var(--red);color:var(--red);font-weight:600}
.ans.parcial{background:var(--amber-lt);border-color:var(--amber);color:var(--amber);font-weight:600}
/* NOTES */
.q-notes{padding:0 18px 13px;display:none}
.q-notes.show{display:block}
.notes-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.notes-lbl+textarea{width:100%;font-family:var(--sans);font-size:12px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);resize:none;line-height:1.5;min-height:54px;transition:border .15s}
.notes-lbl+textarea:focus{outline:none;border-color:var(--blue)}
/* SKIP NOTICE */
.skip-notice{background:#FFFBEB;border:1px solid #F5CE7A;border-radius:8px;padding:11px 15px;margin-bottom:10px;font-size:12px;color:#92600A;line-height:1.5}
.skip-notice strong{font-weight:700}
/* SPECIAL 1.1 PERSONA */
.persona-wrap{padding:15px 18px}
.persona-q-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.persona-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:420px){.persona-opts{grid-template-columns:1fr}}
.p-card{padding:14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;background:#fff;transition:all .15s;user-select:none}
.p-card:hover{border-color:var(--blue);background:var(--blue-lt)}
.p-card.sel{border-color:var(--navy);background:var(--blue-lt)}
.p-icon{font-size:24px;margin-bottom:6px}
.p-title{font-size:13px;font-weight:700;color:var(--navy)}
.p-sub{font-size:11px;color:var(--sub);margin-top:2px}
.persona-fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.persona-fields{grid-template-columns:1fr}}
.pf-grp{display:flex;flex-direction:column;gap:4px}
.pf-grp.full{grid-column:1/-1}
.pf-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em}
.pf-in{font-family:var(--sans);font-size:13px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);transition:border .15s;width:100%}
.pf-in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.08)}
.pf-in::placeholder{color:#B0B7C3}
/* SPECIAL 1.2 PUESTOS */
.puestos-q-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.puestos-hint{font-size:12px;color:var(--sub);padding:7px 11px;background:rgba(0,0,0,.03);border-left:2px solid var(--border);border-radius:4px;margin-bottom:12px}
.puestos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}
.pt-lbl{font-size:12px;font-weight:500;color:var(--text)}
.pt-ctrl{display:flex;align-items:center;gap:5px}
.pt-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--gray);transition:all .15s;flex-shrink:0;padding:0;line-height:1}
.pt-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--navy)}
.pt-num{width:40px;text-align:center;font-family:var(--sans);font-size:14px;font-weight:700;color:var(--navy);border:1.5px solid var(--border);border-radius:6px;padding:2px 4px;background:#fff;-moz-appearance:textfield}
.pt-num::-webkit-inner-spin-button,.pt-num::-webkit-outer-spin-button{-webkit-appearance:none}
.pt-num:focus{outline:none;border-color:var(--blue)}
.pt-total{margin-top:10px;padding:9px 13px;background:var(--blue-lt);border-radius:8px;font-size:13px;color:var(--blue);font-weight:600;display:flex;justify-content:space-between}
/* SUMMARY */
.sum-hero{background:var(--navy);border-radius:var(--radius);padding:22px;color:#fff;margin-bottom:14px}
.sum-hero h2{font-size:17px;font-weight:600;margin-bottom:14px}
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:500px){.sum-stats{grid-template-columns:repeat(2,1fr)}}
.sum-stat{background:rgba(255,255,255,.1);border-radius:8px;padding:11px;text-align:center}
.sum-stat-v{font-size:26px;font-weight:600;color:#fff;line-height:1}
.sum-stat-v.r{color:#FCA5A5}.sum-stat-v.a{color:#FCD34D}
.sum-stat-l{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.sum-card-hd{padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em}
.sem-row{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .1s}
.sem-row:last-child{border-bottom:none}
.sem-row:hover{background:var(--gray-lt)}
.sem-blk{flex:1}
.sem-blk-n{font-size:10px;color:var(--sub);margin-bottom:1px}
.sem-blk-t{font-size:13px;color:var(--text)}
.sem-cnt{font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap}
.sbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap}
.sbadge-A{background:var(--red-lt);color:var(--red)}
.sbadge-M{background:var(--amber-lt);color:var(--amber)}
.sbadge-B{background:var(--green-lt);color:var(--green)}
.sbadge-n{background:var(--gray-lt);color:var(--gray)}
.issue-row{padding:11px 18px;border-bottom:1px solid #F5F5F5;display:flex;gap:10px;align-items:flex-start}
.issue-row:last-child{border-bottom:none}
.ibadge-A{font-size:9px;font-weight:700;color:var(--red);background:var(--red-lt);padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.ibadge-M{font-size:9px;font-weight:700;color:var(--amber);background:var(--amber-lt);padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.issue-id{font-size:10px;font-weight:700;color:var(--sub);margin-bottom:2px}
.issue-t{font-size:13px;color:var(--text);line-height:1.45}
.issue-note{font-size:11px;color:var(--sub);margin-top:3px;font-style:italic}
.doc-grid{padding:12px 18px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:480px){.doc-grid{grid-template-columns:1fr}}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;transition:border .15s;cursor:pointer}
.doc-item:hover{border-color:var(--blue)}
.doc-item.chk{border-color:var(--green-bd);background:var(--green-lt)}
.doc-item input{accent-color:var(--green);cursor:pointer;width:13px;height:13px;flex-shrink:0}
.sum-notes{padding:14px 18px}
.sum-notes textarea{width:100%;font-family:var(--sans);font-size:13px;padding:10px 13px;border:1px solid var(--border);border-radius:8px;background:var(--gray-lt);color:var(--text);resize:vertical;min-height:90px;line-height:1.6;transition:border .15s}
.sum-notes textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.sum-actions{padding:0 18px 14px;display:flex;gap:9px;flex-wrap:wrap}
.s-btn{font-size:13px;font-weight:500;padding:9px 17px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:all .15s}
.s-btn-sec{background:#fff;border-color:var(--border);color:var(--text)}
.s-btn-sec:hover{background:var(--gray-lt)}
.s-btn-pri{background:var(--navy);border-color:var(--navy);color:#fff}
.s-btn-pri:hover{background:var(--blue)}
.ncb{background:#FFFBEB;border:1px solid #F5CE7A;border-radius:8px;padding:13px 16px;display:flex;gap:11px;margin-bottom:12px}
.ncb-icon{font-size:20px;flex-shrink:0}
.ncb h4{font-size:13px;font-weight:700;color:#92600A;margin-bottom:3px}
.ncb p{font-size:12px;color:#92600A;line-height:1.5}
/* NAV FOOTER */
.nav-ft{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:11px 20px;z-index:50}
.nav-ft-inner{max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
.nav-btn{font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:all .15s}
.nav-btn-s{background:#fff;border-color:var(--border);color:var(--text)}
.nav-btn-s:hover{background:var(--gray-lt)}
.nav-btn-s:disabled{opacity:.35;cursor:not-allowed}
.nav-btn-p{background:var(--navy);border-color:var(--navy);color:#fff}
.nav-btn-p:hover{background:var(--blue)}
.nav-lbl{font-size:12px;color:var(--sub);text-align:center}
.nav-lbl strong{color:var(--text)}
@media print{.topbar,.tabs-wrap,.nav-ft,.sum-actions{display:none!important}body{background:#fff}.main{padding:10px}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="topbar-name">Abogados MYA</div>
      <div class="topbar-sub">Diagnóstico Laboral · Restaurante-Bar</div>
    </div>
    <a class="topbar-link" href="https://finiquito-laboral.netlify.app">← Calculadora de Finiquito</a>
  </div>
  <div class="gp-wrap">
    <div class="gp-bar"><div class="gp-fill" id="gp"></div></div>
    <div class="gp-pct" id="gpct">0%</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- NAV FOOTER -->
<div class="nav-ft">
  <div class="nav-ft-inner">
    <button type="button" class="nav-btn nav-btn-s" id="btnPrev" onclick="go(cur-1)">← Anterior</button>
    <div class="nav-lbl" id="navLbl"></div>
    <button type="button" class="nav-btn nav-btn-p" id="btnNext" onclick="go(cur+1)">Siguiente →</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATOS
// ═══════════════════════════════════════════════════════════
const PUESTOS=[
  {id:'hostess',n:'Hostess / Recepcionista'},
  {id:'mesero',n:'Mesero / Mesera'},
  {id:'chef',n:'Chef / Jefe de Cocina'},
  {id:'cocinero',n:'Cocinero / Cocinera'},
  {id:'barman',n:'Barman / Bartender'},
  {id:'cajero',n:'Cajero / Cajera'},
  {id:'limpieza',n:'Limpieza'},
  {id:'gerente',n:'Gerente / Encargado'},
  {id:'temporada',n:'Personal de Temporada'},
  {id:'otro',n:'Otro puesto'},
];

const BLOCKS=[
{id:1,title:'Datos generales',desc:'Información básica del negocio y estructura de personal',
qs:[
{id:'1.1',tipo:'persona',r:'B'},
{id:'1.2',tipo:'puestos',r:'B'},
{id:'1.3',t:'¿Cuenta con registro patronal vigente ante el IMSS?',r:'A',h:'Sin registro patronal no hay base para cumplir las obligaciones de seguridad social.'},
{id:'1.4',t:'¿Tiene licencia de funcionamiento y permiso de venta de alcohol vigentes?',r:'A',h:'Su ausencia agrava el riesgo en inspecciones conjuntas de la STPS y la Cofepris.'},
{id:'1.5',t:'¿Tiene definida formalmente la estructura de puestos del establecimiento?',r:'B'},
{id:'1.6',t:'¿Hay más de un turno de trabajo operando simultáneamente o de forma rotatoria?',r:'B'},
{id:'1.7',t:'¿Ha recibido visitas de inspección de la STPS, IMSS o Cofepris en los últimos 3 años?',r:'M',h:'Anote los resultados y observaciones que le hayan dejado.'},
{id:'1.8',t:'¿Existe algún juicio o procedimiento laboral activo en este momento?',r:'A',h:'Incluye demandas, procedimientos de conciliación y amparos laborales.'},
]},
{id:2,title:'Contratos de trabajo',desc:'Existencia, tipo y contenido de los contratos individuales — Art. 25 LFT',
qs:[
{id:'2.1',t:'¿Todo el personal activo tiene contrato individual de trabajo por escrito?',r:'A',h:'Sin contrato escrito la ley presume las condiciones más favorables al trabajador.',pivote:true},
{id:'2.2',t:'¿Los contratos establecen el tipo correcto de relación: tiempo indeterminado, temporada o determinado según la función real?',r:'A',h:'Un contrato a plazo fijo para función permanente es nulo y revierte a tiempo indeterminado.',dep:'2.1'},
{id:'2.3',t:'¿Los contratos contienen todos los datos mínimos del Art. 25 LFT: nombre, CURP, RFC, NSS, puesto, jornada, salario, lugar y día de pago?',r:'A',dep:'2.1'},
{id:'2.4',t:'¿Los contratos de meseros, barman y hostess incluyen cláusula de propinas con componente de integración para el SDI ante el IMSS?',r:'A',h:'Sin esta cláusula el SDI está subdeclarado ante el IMSS en todos esos puestos.',dep:'2.1'},
{id:'2.5',t:'¿Los contratos del chef y personal de confianza incluyen cláusula de confidencialidad con vigencia posterior al término de la relación?',r:'A',dep:'2.1'},
{id:'2.6',t:'¿El contrato del cajero regula la responsabilidad por valores y prohíbe descuentos sin soporte documental?',r:'A',h:'Sin esta cláusula cualquier descuento por faltantes es potencialmente ilegal.',dep:'2.1'},
{id:'2.7',t:'¿Los contratos regulan el uso de herramientas tecnológicas: WhatsApp institucional, POS, plataformas de reservaciones?',r:'M',dep:'2.1'},
{id:'2.8',t:'¿Los contratos del personal de temporada están tipificados como contratos por temporada (discontinuos)?',r:'A',dep:'2.1'},
{id:'2.9',t:'¿Cada trabajador tiene un ejemplar firmado de su contrato y el patrón conserva el acuse en el expediente?',r:'M',dep:'2.1'},
{id:'2.10',t:'¿Los contratos regulan el período de prueba conforme a los Arts. 39-A a 39-F LFT?',r:'M',dep:'2.1'},
]},
{id:3,title:'Reglamento y comisiones',desc:'RIT y cinco comisiones obligatorias — Arts. 422-425 y 509-512 LFT',
qs:[
{id:'3.1',t:'¿Cuenta con Reglamento Interior de Trabajo elaborado por Comisión Mixta?',r:'A',h:'Sin RIT el patrón no tiene base formal para aplicar medidas disciplinarias.'},
{id:'3.2',t:'¿El RIT fue depositado ante el CFCRL y se conserva el acuse?',r:'A',h:'Un RIT no depositado no es oponible al trabajador ni a ninguna autoridad.'},
{id:'3.3',t:'¿El RIT está fijado permanentemente en los lugares más visibles del establecimiento?',r:'A'},
{id:'3.4',t:'¿Se entregó un ejemplar del RIT a cada trabajador con acuse de recibo en su expediente?',r:'M'},
{id:'3.5',t:'¿El RIT cubre todas las materias del Art. 423 LFT: jornada, descansos, sanciones, higiene, uso de asientos y exámenes médicos?',r:'A'},
{id:'3.6',t:'¿Existe Comisión de Seguridad e Higiene constituida con acta formal y registrada ante la STPS?',r:'A'},
{id:'3.7',t:'¿Existe Comisión Mixta de Capacitación, Adiestramiento y Productividad con acta formal?',r:'A'},
{id:'3.8',t:'¿Se ha designado responsable o constituido comisión para la NOM-035-STPS-2018 con acta formal?',r:'A'},
{id:'3.9',t:'¿El RIT o sus anexos contienen el protocolo frente a hostigamiento y acoso sexual exigido por el Art. 132, fr. XXXI LFT?',r:'A'},
]},
{id:4,title:'Jornada y asistencia',desc:'Horarios, registro y tiempo extraordinario — Arts. 58-68 LFT',
qs:[
{id:'4.1',t:'¿Los horarios de cada turno están definidos por escrito y coinciden con el tipo de jornada pactado en los contratos?',r:'A'},
{id:'4.2',t:'¿Existe sistema de registro de asistencia (checador, huella, app) que genere evidencia documental conservable?',r:'A',h:'Sin registro es imposible acreditar faltas injustificadas en una rescisión ante autoridad.'},

let cur = 0;                          // bloque activo (BLOCKS.length = resumen)
const A = {};                         // respuestas { qId: 'si'|'no'|'parcial' }
const N = {};                         // notas { qId: texto }
const PT = {};                        // plantilla { puestoId: numero }
let persona = '';                     // 'pm' | 'pf'
const PD = {nombre:'',rfc:'',regimen:'',representante:''};
const DC = {};                        // doc checks
let finalNotes = '';

// ═══════════════════════════════════════════════════════════
// HELPERS PUROS (sin DOM)
// ═══════════════════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const skip = q => q.dep && A[q.dep]==='no';
const totalPt = () => Object.values(PT).reduce((s,v)=>s+(parseInt(v)||0),0);
const answeredCount = () => {
  let n=0;
  BLOCKS.forEach(b=>b.qs.forEach(q=>{
    if(skip(q)) return;
    if(q.tipo==='persona' && persona) n++;
    else if(q.tipo==='puestos' && totalPt()>0) n++;
    else if(!q.tipo && A[q.id]) n++;
  }));
  return n;
};
const visibleCount = () => BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!skip(q)).length, 0);
const blkAnswered = b => b.qs.filter(q=>{
  if(skip(q)) return true;
  if(q.tipo==='persona') return !!persona;
  if(q.tipo==='puestos') return totalPt()>0;
  return !!A[q.id];
}).length;
const blkRisk = b => {
  const hasA = b.qs.some(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='parcial')&&q.r==='A');
  const midN = b.qs.filter(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='parcial')&&q.r==='M').length;
  if(hasA) return 'A';
  if(midN>1) return 'M';
  if(!b.qs.some(q=>A[q.id]||q.tipo)) return null;
  return 'B';
};

function buildTabs(){
  const c = document.getElementById('tabs');
  let h='';
  BLOCKS.forEach((b,i)=>{ h+=`<button type="button" class="tab" id="tab-${i}" onclick="go(${i})"><span class="tab-dot" id="tdot-${i}"></span>${b.id}. ${b.title}</button>`; });
  h+=`<button type="button" class="tab" id="tab-${BLOCKS.length}" onclick="go(${BLOCKS.length})"><span class="tab-dot"></span>Diagnóstico</button>`;
  c.innerHTML=h;
}

function htmlPuestos(){
  let rows='';
  PUESTOS.forEach(p=>{
    const v=PT[p.id]||0;
    rows+=`<div class="pt-row">
      <span class="pt-lbl">${esc(p.n)}</span>
      <div class="pt-ctrl">
        <button type="button" class="pt-btn" onclick="adjPT('${p.id}',-1)">−</button>
        <input type="number" class="pt-num" id="pt-${p.id}" min="0" max="99" value="${v}" oninput="setPT('${p.id}',this.value)">
        <button type="button" class="pt-btn" onclick="adjPT('${p.id}',1)">+</button>
      </div>
    </div>`;
  });
  const tot=totalPt();
  return `<div style="padding:14px 18px" id="card-1.2">
    <div class="puestos-q-hdr">
      <span class="q-num">1.2</span>
      <span class="q-txt">¿Cuántas personas trabajan actualmente en el establecimiento?</span>
      <span class="risk risk-B"></span>
    </div>
    <div class="puestos-hint">Indique el número por puesto. Dimensiona las obligaciones y la paquetería necesaria.</div>
    <div class="puestos-grid">${rows}</div>
    <div class="pt-total">
      <span>Total en plantilla</span>
      <span id="pt-tot">${tot} persona${tot!==1?'s':''}</span>
    </div>
  </div>`;
}

function htmlQ(q){
  const sk=skip(q);
  const v=A[q.id]||'';
  const cardCls='q-card'+(sk?' skipped':v?' '+v:'');
  const showN=!sk&&(v==='no'||v==='parcial');
  return `<div class="${cardCls}" id="qcard-${q.id}">
    <div class="q-body">
      <div class="q-hdr">
        <span class="q-num">${esc(q.id)}</span>
        <span class="q-txt">${esc(q.t)}</span>
        <span class="risk risk-${q.r}"></span>
      </div>
      ${q.h&&!sk?`<div class="q-hint">${esc(q.h)}</div>`:''}
      ${sk?`<div class="q-hint skip-hint">Omitida — no aplica sin contratos escritos</div>`:''}
      ${!sk?`<div class="ans-row">
        <button type="button" class="ans${v==='si'?' si':''}" id="ans-${q.id}-si" onclick="setA('${q.id}','si')">✓ Sí</button>
        <button type="button" class="ans${v==='no'?' no':''}" id="ans-${q.id}-no" onclick="setA('${q.id}','no')">✗ No</button>
        <button type="button" class="ans${v==='parcial'?' parcial':''}" id="ans-${q.id}-parcial" onclick="setA('${q.id}','parcial')">~ Parcial</button>
      </div>`:''}
    </div>
    <div class="q-notes${showN?' show':''}" id="qnotes-${q.id}">
      <div class="notes-lbl">Notas / detalle</div>
      <textarea placeholder="Anote los detalles relevantes para el expediente..." onchange="N['${q.id}']=this.value" oninput="ar(this)">${esc(N[q.id]||'')}</textarea>
    </div>
  </div>`;
}

function htmlBlock(b){
  const ba=blkAnswered(b), bt=b.qs.length;
  const pct=Math.round((ba/bt)*100);
  const skipBanner=b.id===2&&A['2.1']==='no'
    ?`<div class="skip-notice"><strong>Las preguntas 2.2 a 2.10 se omiten</strong> porque no hay contratos escritos. Elaborar contratos para todo el personal es la acción de mayor prioridad.</div>`:'' ;
  let qhtml='';
  b.qs.forEach(q=>{
    if(q.tipo==='persona') qhtml+=htmlPersona();
    else if(q.tipo==='puestos') qhtml+=htmlPuestos();
    else qhtml+=htmlQ(q);
  });
  return `<div class="blk-hd">
    <span class="blk-badge">Bloque ${b.id}</span>
    <div class="blk-title">${esc(b.title)}</div>
    <div class="blk-desc">${esc(b.desc)}</div>
    <div class="blk-prog-row">
      <div class="blk-prog-bar"><div class="blk-prog-fill" id="bpf" style="width:${pct}%"></div></div>
      <div class="blk-prog-lbl" id="bpl">${ba} / ${bt} respondidas</div>
    </div>
  </div>
  ${skipBanner}${qhtml}`;
}

function htmlSummary(){
  const allQ=BLOCKS.flatMap(b=>b.qs).filter(q=>!q.tipo&&!skip(q));
  const issues=allQ.filter(q=>A[q.id]==='no'||A[q.id]==='parcial');
  const hi=issues.filter(q=>q.r==='A'), mi=issues.filter(q=>q.r==='M');
  const sc=A['2.1']==='no';
  let h=`<div class="sum-hero">
    <h2>Diagnóstico de cumplimiento laboral</h2>
    <div class="sum-stats">
      <div class="sum-stat"><div class="sum-stat-v">${answeredCount()}</div><div class="sum-stat-l">Preguntas atendidas</div></div>
      <div class="sum-stat"><div class="sum-stat-v${issues.length?' r':''}">${issues.length}</div><div class="sum-stat-l">Incumplimientos</div></div>
      <div class="sum-stat"><div class="sum-stat-v${hi.length?' r':''}">${hi.length}</div><div class="sum-stat-l">Riesgo ALTO</div></div>
      <div class="sum-stat"><div class="sum-stat-v${mi.length?' a':''}">${mi.length}</div><div class="sum-stat-l">Riesgo MEDIO</div></div>
    </div>
  </div>`;
  if(sc) h+=`<div class="ncb"><div class="ncb-icon">⚠️</div><div><h4>Personal sin contrato escrito — máxima prioridad</h4><p>Las preguntas 2.2–2.10 fueron omitidas. Elaborar contratos para cada puesto activo es la primera acción del plan de trabajo.</p></div></div>`;
  // semáforo
  h+=`<div class="sum-card"><div class="sum-card-hd">Semáforo por bloque — clic para ir al bloque</div>`;
  BLOCKS.forEach((b,i)=>{
    const r=blkRisk(b);
    const bi=b.qs.filter(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='parcial')).length;
    h+=`<div class="sem-row" onclick="go(${i})">
      <div class="sem-blk"><div class="sem-blk-n">Bloque ${b.id}</div><div class="sem-blk-t">${esc(b.title)}</div></div>
      <div class="sem-cnt">${bi>0?bi+' problema'+(bi>1?'s':''):''}</div>
      <span class="sbadge ${r?'sbadge-'+r:'sbadge-n'}">${r?{A:'ALTO',M:'MEDIO',B:'BAJO'}[r]:'Sin responder'}</span>
    </div>`;
  });
  h+=`</div>`;
  if(hi.length){
    h+=`<div class="sum-card"><div class="sum-card-hd" style="color:var(--red)">Contingencias de atención inmediata — Riesgo ALTO</div>`;
    hi.forEach(q=>{ h+=`<div class="issue-row"><div class="ibadge-A">ALTO</div><div><div class="issue-id">${esc(q.id)}</div><div class="issue-t">${esc(q.t)}</div>${N[q.id]?`<div class="issue-note">↳ ${esc(N[q.id])}</div>`:''}</div></div>`; });
    h+=`</div>`;
  }
  if(mi.length){
    h+=`<div class="sum-card"><div class="sum-card-hd" style="color:var(--amber)">Contingencias de seguimiento — Riesgo MEDIO</div>`;
    mi.forEach(q=>{ h+=`<div class="issue-row"><div class="ibadge-M">MEDIO</div><div><div class="issue-id">${esc(q.id)}</div><div class="issue-t">${esc(q.t)}</div>${N[q.id]?`<div class="issue-note">↳ ${esc(N[q.id])}</div>`:''}</div></div>`; });
    h+=`</div>`;
  }
  h+=`<div class="sum-card"><div class="sum-card-hd">Paquetería necesaria</div><div class="doc-grid">`;
  DOCS.forEach((d,i)=>{ h+=`<label class="doc-item${DC[i]?' chk':''}"><input type="checkbox" ${DC[i]?'checked':''} onchange="setDC(${i},this.checked)"><span>${esc(d)}</span></label>`; });
  h+=`</div></div>`;
  h+=`<div class="sum-card"><div class="sum-card-hd">Observaciones y estrategia — uso exclusivo del despacho</div>
    <div class="sum-notes"><textarea placeholder="Contingencia más urgente · Estrategia · Honorarios · Fecha de inicio..." onchange="finalNotes=this.value" oninput="ar(this)">${esc(finalNotes)}</textarea></div>
    <div class="sum-actions">
      <button type="button" class="s-btn s-btn-sec" onclick="window.print()">🖨 Imprimir / PDF</button>
      <button type="button" class="s-btn s-btn-pri" onclick="if(confirm('¿Reiniciar el diagnóstico?')){location.reload();}">Nuevo diagnóstico</button>
    </div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// RENDER INICIAL + CAMBIO DE BLOQUE
// ═══════════════════════════════════════════════════════════
function init(){
  buildTabs();
  paintTabs();
  showBlock();
  updateProg();
  updateNav();
}

function showBlock(){
  // Genera el HTML del bloque activo y lo inyecta
  const m=document.getElementById('main');
  m.innerHTML = cur===BLOCKS.length ? htmlSummary() : htmlBlock(BLOCKS[cur]);
  m.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
}

function go(i){
  cur=Math.max(0,Math.min(BLOCKS.length,i));
  showBlock();
  paintTabs();
  updateNav();
  updateProg();
  window.scrollTo({top:0,behavior:'smooth'});
  // Asegurar que el tab activo sea visible
  const at=document.getElementById('tab-'+cur);
  if(at) at.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════════
// ACCIONES — SOLO MUTACIONES DOM, SIN innerHTML
// ═══════════════════════════════════════════════════════════

// Respuesta Sí/No/Parcial
function setA(id,val){
  A[id]=val;

  // Pivote 2.1: necesita re-render del bloque (aparece banner + skip)
  // pero restauramos el scroll para no saltar
  if(id==='2.1'){
    const sy=window.scrollY;
    showBlock();
    requestAnimationFrame(()=>window.scrollTo({top:sy,behavior:'instant'}));
    paintTabs();
    updateProg();
    return;
  }

  // Para cualquier otra pregunta: mutación quirúrgica
  // 1. Color de la tarjeta
  const card=document.getElementById('qcard-'+id);
  if(card) card.className='q-card '+val;

  // 2. Estado de los tres botones
  ['si','no','parcial'].forEach(opt=>{
    const btn=document.getElementById('ans-'+id+'-'+opt);
    if(btn) btn.className='ans'+(val===opt?' '+opt:'');
  });

  // 3. Notas: mostrar si No o Parcial
  const nd=document.getElementById('qnotes-'+id);
  if(nd) nd.className='q-notes'+(val==='no'||val==='parcial'?' show':'');

  // 4. Barra de progreso del bloque
  if(cur<BLOCKS.length){
    const b=BLOCKS[cur];
    const ba=blkAnswered(b), pct=Math.round((ba/b.qs.length)*100);
    const bf=document.getElementById('bpf');
    const bl=document.getElementById('bpl');
    if(bf) bf.style.width=pct+'%';
    if(bl) bl.textContent=`${ba} / ${b.qs.length} respondidas`;
  }

  paintTabs();
  updateProg();
}

// Persona jurídica
function selPersona(tipo){
  persona=tipo;
  // Actualizar solo las clases de las tarjetas de persona (sin innerHTML)
  ['pm','pf'].forEach(t=>{
    const c=document.getElementById('pcard-'+t);
    if(c) c.className='p-card'+(tipo===t?' sel':'');
  });
  // Si cambia el tipo, actualizar labels de los campos
  const lNombre=document.querySelector('label[for="pd-nombre"]');
  if(lNombre) lNombre.textContent=tipo==='pm'?'Denominación o razón social':'Nombre completo del patrón';
  const inNombre=document.getElementById('pd-nombre');
  if(inNombre) inNombre.placeholder=tipo==='pm'?'Ej. Restaurantes del Centro SA de CV':'Ej. Juan Pérez García';
  const inRfc=document.getElementById('pd-rfc');
  if(inRfc) inRfc.placeholder=tipo==='pm'?'Ej. RCE850301ABC':'Ej. PEGJ850301XYZ';
  // Campo representante: aparece solo en Persona Moral
  const repWrap=document.getElementById('pd-rep');
  if(!repWrap&&tipo==='pm'){
    // Añadir campo representante sin reemplazar nada
    const pf=document.querySelector('.persona-fields');
    if(pf){
      const d=document.createElement('div');
      d.className='pf-grp full';
      d.innerHTML='<label class="pf-lbl" for="pd-rep">Representante legal</label><input class="pf-in" id="pd-rep" type="text" placeholder="Nombre completo del representante o apoderado" oninput="pdSet(\'representante\',this.value)">';
      pf.appendChild(d);
    }
  } else if(repWrap&&tipo==='pf'){
    repWrap.closest('.pf-grp')&&repWrap.closest('.pf-grp').remove();
  }
  updateProg();
  paintTabs();
}

function pdSet(field,val){ PD[field]=val; }

// Steppers de puestos — NUNCA re-renderizan, solo tocan el input y el total
function adjPT(id,delta){
  const inp=document.getElementById('pt-'+id);
  if(!inp) return;
  const nv=Math.max(0,(parseInt(inp.value)||0)+delta);
  inp.value=nv;
  PT[id]=nv;
  updPTTotal();
}
function setPT(id,val){
  PT[id]=Math.max(0,parseInt(val)||0);
  updPTTotal();
}
function updPTTotal(){
  const el=document.getElementById('pt-tot');
  const tot=totalPt();
  if(el) el.textContent=`${tot} persona${tot!==1?'s':''}`;
  updateProg();
  paintTabs();
}

// Doc checks en resumen
function setDC(i,v){
  DC[i]=v;
  const items=document.querySelectorAll('.doc-item');
  if(items[i]) items[i].className='doc-item'+(v?' chk':'');
}

// ═══════════════════════════════════════════════════════════
// ACTUALIZADORES LIGEROS DE UI
// ═══════════════════════════════════════════════════════════
function updateProg(){
  const ac=answeredCount(), tot=visibleCount();
  const pct=tot>0?Math.round((ac/tot)*100):0;
  const gp=document.getElementById('gp');
  const gc=document.getElementById('gpct');
  if(gp) gp.style.width=pct+'%';
  if(gc) gc.textContent=pct+'%';
}

function paintTabs(){
  BLOCKS.forEach((b,i)=>{
    const t=document.getElementById('tab-'+i);
    const d=document.getElementById('tdot-'+i);
    if(!t) return;
    const r=blkRisk(b), done=blkAnswered(b)===b.qs.length;
    t.className='tab'+(cur===i?' active':r==='A'?' warn':done?' done':'');
    if(d) d.style.background=r==='A'?'var(--red)':r==='M'?'var(--amber)':done?'var(--green)':'transparent';
  });
  const st=document.getElementById('tab-'+BLOCKS.length);
  if(st) st.className='tab'+(cur===BLOCKS.length?' active':'');
}

function updateNav(){
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  const lbl=document.getElementById('navLbl');
  if(prev) prev.disabled=(cur===0);
  if(next){
    if(cur===BLOCKS.length){ next.textContent='Reiniciar'; next.onclick=()=>{if(confirm('¿Reiniciar?'))location.reload();}; }
    else { next.textContent='Siguiente →'; next.onclick=()=>go(cur+1); }
  }
  if(lbl){
    lbl.innerHTML= cur===BLOCKS.length
      ? '<strong>Diagnóstico final</strong>'
      : `<strong>${BLOCKS[cur].title}</strong><br>Bloque ${BLOCKS[cur].id} de ${BLOCKS.length}`;
  }
}

function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

// ═══════════════════════════════════════════════════════════
// INICIO
// ═══════════════════════════════════════════════════════════
init();
</script>

</html>

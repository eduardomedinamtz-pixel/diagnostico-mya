<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagnóstico Laboral — Abogados MYA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2E5FA3;--blue-lt:#EAF1FB;
  --green:#1A7A45;--green-lt:#E8F6EE;--green-bd:#A3D4B5;
  --red:#B03025;--red-lt:#FDF0EF;--red-bd:#F0A89F;
  --amber:#96620A;--amber-lt:#FEF6E4;--amber-bd:#F5CE7A;
  --gray:#6B7280;--gray-lt:#F3F4F6;--border:#E2E4E9;
  --text:#111827;--sub:#6B7280;
  --sans:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --radius:12px
}
body{font-family:var(--sans);background:#F7F8FA;color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
/* TOPBAR */
.topbar{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.topbar-inner{max-width:760px;margin:0 auto;padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.topbar-brand .name{font-size:13px;font-weight:600;color:#fff}
.topbar-brand .sub{font-size:11px;color:#9CB8D8;margin-top:1px}
.topbar-link{font-size:11px;color:#9CB8D8;text-decoration:none;white-space:nowrap}
.topbar-link:hover{color:#fff}
.gp-wrap{max-width:760px;margin:0 auto;padding:0 20px 8px;display:flex;align-items:center;gap:10px}
.gp-bar{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.gp-fill{height:100%;background:#5B9CF6;border-radius:2px;transition:width .5s}
.gp-pct{font-size:11px;color:#9CB8D8;min-width:28px;text-align:right}
/* TABS */
.tabs-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{max-width:760px;margin:0 auto;padding:0 16px;display:flex}
.tab{font-size:11px;font-weight:500;padding:11px 12px;border:none;background:transparent;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab.done{color:var(--green)}
.tab.warn{color:var(--red)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:transparent;flex-shrink:0}
/* MAIN */
.main{max-width:760px;margin:0 auto;padding:24px 20px 100px}
/* BLOCK HEADER */
.blk-hd{margin-bottom:20px}
.blk-badge{display:inline-block;font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:3px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.blk-title{font-size:21px;font-weight:700;color:var(--navy);margin-bottom:4px}
.blk-desc{font-size:13px;color:var(--sub);margin-bottom:12px}
.blk-prog{display:flex;align-items:center;gap:10px}
.blk-prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.blk-prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.blk-prog-lbl{font-size:11px;color:var(--sub);white-space:nowrap}
/* QUESTION CARD */
.qc{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.qc.si{border-color:var(--green-bd);background:var(--green-lt)}
.qc.no{border-color:var(--red-bd);background:var(--red-lt)}
.qc.medias{border-color:var(--amber-bd);background:var(--amber-lt)}
.qc.skipped{opacity:.35;pointer-events:none}
.qc-body{padding:16px 18px 13px}
.qc-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px}
.qc-num{font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:3px;flex-shrink:0;letter-spacing:.03em}
.qc-txt{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;flex:1}
/* BOTONES DE RESPUESTA */
.ans-row{display:flex;gap:7px;flex-wrap:wrap}
.ab{border:1.5px solid var(--border);border-radius:30px;padding:8px 16px;font-size:13px;font-weight:500;color:var(--gray);background:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;line-height:1}
.ab:hover{border-color:var(--blue);color:var(--navy);background:var(--blue-lt)}
.ab.si{background:var(--green-lt);border-color:var(--green);color:var(--green);font-weight:700}
.ab.no{background:var(--red-lt);border-color:var(--red);color:var(--red);font-weight:700}
.ab.medias{background:var(--amber-lt);border-color:var(--amber);color:var(--amber);font-weight:700}
/* NOTAS — solo si No o A medias */
.qnotes{padding:0 18px 13px;display:none}
.qnotes.show{display:block}
.qnotes-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.qnotes textarea{width:100%;font-family:var(--sans);font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);resize:none;line-height:1.5;min-height:50px;transition:border .15s}
.qnotes textarea:focus{outline:none;border-color:var(--blue)}
/* SKIP NOTICE */
.skip-notice{background:#FFFBEB;border:1px solid #F5CE7A;border-radius:8px;padding:11px 15px;margin-bottom:10px;font-size:13px;color:#92600A;line-height:1.5}
/* ESPECIAL 1.1 PERSONA */
.persona-wrap{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.persona-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.persona-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:400px){.persona-opts{grid-template-columns:1fr}}
.pc{padding:14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;background:#fff;transition:all .15s;user-select:none}
.pc:hover{border-color:var(--blue);background:var(--blue-lt)}
.pc.sel{border-color:var(--navy);background:var(--blue-lt)}
.pc-icon{font-size:26px;margin-bottom:6px}
.pc-title{font-size:13px;font-weight:700;color:var(--navy)}
.pc-sub{font-size:11px;color:var(--sub);margin-top:2px}
.persona-fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:460px){.persona-fields{grid-template-columns:1fr}}
.pf-g{display:flex;flex-direction:column;gap:4px}
.pf-g.full{grid-column:1/-1}
.pf-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em}
.pf-in{font-family:var(--sans);font-size:13px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);transition:border .15s;width:100%}
.pf-in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.08)}
.pf-in::placeholder{color:#B0B7C3}
/* ESPECIAL 1.2 PUESTOS */
.puestos-wrap{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.puestos-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.puestos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}
.pt-lbl{font-size:12px;font-weight:500;color:var(--text)}
.pt-ctrl{display:flex;align-items:center;gap:5px}
.pt-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--gray);padding:0;line-height:1;flex-shrink:0;transition:all .15s}
.pt-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--navy)}
.pt-num{width:42px;text-align:center;font-family:var(--sans);font-size:14px;font-weight:700;color:var(--navy);border:1.5px solid var(--border);border-radius:6px;padding:3px 4px;background:#fff;-moz-appearance:textfield}
.pt-num::-webkit-inner-spin-button,.pt-num::-webkit-outer-spin-button{-webkit-appearance:none}
.pt-num:focus{outline:none;border-color:var(--blue)}
.pt-total{margin-top:10px;padding:9px 13px;background:var(--blue-lt);border-radius:8px;font-size:13px;color:var(--blue);font-weight:600;display:flex;justify-content:space-between}
/* RESUMEN */
.sum-hero{background:var(--navy);border-radius:var(--radius);padding:22px;color:#fff;margin-bottom:14px}
.sum-hero h2{font-size:17px;font-weight:600;margin-bottom:14px}
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:480px){.sum-stats{grid-template-columns:repeat(2,1fr)}}
.ss{background:rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center}
.ss-v{font-size:26px;font-weight:600;color:#fff;line-height:1}
.ss-v.r{color:#FCA5A5}.ss-v.a{color:#FCD34D}
.ss-l{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.sum-card-hd{padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em}
.sem-row{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .1s}
.sem-row:last-child{border-bottom:none}
.sem-row:hover{background:var(--gray-lt)}
.sem-blk{flex:1}
.sem-blk-n{font-size:10px;color:var(--sub)}
.sem-blk-t{font-size:13px;color:var(--text)}
.sbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap}
.sbadge-A{background:var(--red-lt);color:var(--red)}
.sbadge-M{background:var(--amber-lt);color:var(--amber)}
.sbadge-B{background:var(--green-lt);color:var(--green)}
.sbadge-n{background:var(--gray-lt);color:var(--gray)}
.issue-row{padding:11px 18px;border-bottom:1px solid #F5F5F5;display:flex;gap:10px;align-items:flex-start}
.issue-row:last-child{border-bottom:none}
.ibadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.ibadge-A{color:var(--red);background:var(--red-lt)}
.ibadge-M{color:var(--amber);background:var(--amber-lt)}
.issue-id{font-size:10px;font-weight:700;color:var(--sub);margin-bottom:2px}
.issue-t{font-size:13px;color:var(--text);line-height:1.4}
.issue-tech{font-size:11px;color:var(--sub);margin-top:3px;font-style:italic}
.issue-note{font-size:11px;color:var(--blue);margin-top:3px}
.doc-grid{padding:12px 18px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:460px){.doc-grid{grid-template-columns:1fr}}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;cursor:pointer;transition:border .15s}
.doc-item:hover{border-color:var(--blue)}
.doc-item.chk{border-color:var(--green-bd);background:var(--green-lt)}
.doc-item input{accent-color:var(--green);cursor:pointer;width:13px;height:13px;flex-shrink:0}
.sum-notes{padding:14px 18px}
.sum-notes textarea{width:100%;font-family:var(--sans);font-size:13px;padding:10px 13px;border:1px solid var(--border);border-radius:8px;background:var(--gray-lt);color:var(--text);resize:vertical;min-height:90px;line-height:1.6;transition:border .15s}
.sum-notes textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.sum-actions{padding:0 18px 14px;display:flex;gap:9px;flex-wrap:wrap}
.s-btn{font-size:13px;font-weight:500;padding:9px 17px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:all .15s}
.s-btn-sec{background:#fff;border-color:var(--border);color:var(--text)}
.s-btn-sec:hover{background:var(--gray-lt)}
.s-btn-pri{background:var(--navy);border-color:var(--navy);color:#fff}
.s-btn-pri:hover{background:var(--blue)}
/* NAV FOOTER */
.nav-ft{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:11px 20px;z-index:50}
.nav-ft-inner{max-width:760px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
.nav-btn{font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:all .15s}
.nb-s{background:#fff;border-color:var(--border);color:var(--text)}
.nb-s:hover{background:var(--gray-lt)}
.nb-s:disabled{opacity:.35;cursor:not-allowed}
.nb-p{background:var(--navy);border-color:var(--navy);color:#fff}
.nb-p:hover{background:var(--blue)}
.nav-lbl{font-size:12px;color:var(--sub);text-align:center;line-height:1.4}
.nav-lbl strong{color:var(--text)}
@media print{.topbar,.tabs-wrap,.nav-ft,.sum-actions{display:none!important}body{background:#fff}.main{padding:10px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <div class="name">Abogados MYA</div>
      <div class="sub">Diagnóstico Laboral · Restaurante-Bar</div>
    </div>
    <a class="topbar-link" href="https://finiquito-laboral.netlify.app">← Calculadora de Finiquito</a>
  </div>
  <div class="gp-wrap">
    <div class="gp-bar"><div class="gp-fill" id="gp"></div></div>
    <div class="gp-pct" id="gpct">0%</div>
  </div>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="main"></div>

<div class="nav-ft">
  <div class="nav-ft-inner">
    <button type="button" class="nav-btn nb-s" id="btnPrev" onclick="go(cur-1)">← Anterior</button>
    <div class="nav-lbl" id="navLbl"></div>
    <button type="button" class="nav-btn nb-p" id="btnNext" onclick="go(cur+1)">Siguiente →</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATOS — preguntas en lenguaje llano para el patrón
// Metadatos jurídicos (r, tech) son solo para el resumen
// ══════════════════════════════════════════════════════
const PUESTOS=[
  {id:'hostess',n:'Hostess / Recepcionista'},
  {id:'mesero',n:'Mesero / Mesera'},
  {id:'chef',n:'Chef / Jefe de Cocina'},
  {id:'cocinero',n:'Cocinero / Cocinera'},
  {id:'barman',n:'Barman / Bartender'},
  {id:'cajero',n:'Cajero / Cajera'},
  {id:'limpieza',n:'Personal de Limpieza'},
  {id:'gerente',n:'Gerente / Encargado'},
  {id:'temporada',n:'Personal de Temporada'},
  {id:'otro',n:'Otro puesto'},
];

// nota: campo "note" es la pregunta complementaria cuando responden No o A medias
const BLOCKS=[
{id:1,title:'Su negocio',desc:'Cuéntenos cómo está organizado su establecimiento',
qs:[
{id:'1.1',tipo:'persona'},
{id:'1.2',tipo:'puestos'},
{id:'1.3',t:'¿Está registrado como patrón ante el IMSS?',r:'A',tech:'Registro patronal — LSS Art. 15',note:'¿Sabe si tiene número de registro patronal?'},
{id:'1.4',t:'¿Tiene en regla los permisos del negocio: funcionamiento y venta de alcohol?',r:'A',tech:'Licencias municipales y sanitarias',note:'¿Cuál de los permisos le falta o está vencido?'},
{id:'1.5',t:'¿Tiene por escrito quién hace qué en su negocio (descripción de puestos)?',r:'B',tech:'Organigrama y descripción de funciones',note:'¿Cómo se organizan actualmente?'},
{id:'1.6',t:'¿Su personal trabaja en más de un turno?',r:'B',tech:'Jornadas múltiples',note:'¿Cuántos turnos maneja?'},
{id:'1.7',t:'¿Ha recibido inspectores del gobierno en su negocio en los últimos 3 años?',r:'M',tech:'Visitas STPS, IMSS, Cofepris',note:'¿De qué dependencia fueron y qué le observaron?'},
{id:'1.8',t:'¿Tiene alguna demanda o conflicto laboral activo en este momento?',r:'A',tech:'Litigios laborales activos',note:'¿Cuántos asuntos y en qué etapa están?'},
]},
{id:2,title:'Su personal y contratos',desc:'Queremos saber cómo está documentada la relación con su gente',
qs:[
{id:'2.1',t:'¿Todo su personal tiene un contrato de trabajo firmado?',r:'A',tech:'Contratos individuales — Art. 25 LFT',note:'¿Aproximadamente cuántos no tienen contrato?',pivote:true},
{id:'2.2',t:'¿Los contratos especifican claramente el puesto, el horario y el sueldo de cada persona?',r:'A',tech:'Contenido mínimo — Art. 25 LFT',dep:'2.1'},
{id:'2.3',t:'¿Los contratos de sus meseros, bartenders y hostess mencionan las propinas?',r:'A',tech:'Propinas e integración SDI — Arts. 346-349 LFT',dep:'2.1'},
{id:'2.4',t:'¿El contrato de su cajero incluye cómo se maneja el dinero y la responsabilidad por el efectivo?',r:'A',tech:'Responsabilidad valores — cajero',dep:'2.1'},
{id:'2.5',t:'¿Los contratos del chef y encargados incluyen algún compromiso de confidencialidad sobre recetas, costos y proveedores?',r:'A',tech:'Confidencialidad — personal de confianza',dep:'2.1'},
{id:'2.6',t:'¿Los contratos mencionan qué equipos y herramientas se le entregan a cada trabajador (uniforme, celular, sistema)?',r:'M',tech:'Herramientas y tecnología — Art. 25 LFT fr. IX',dep:'2.1'},
{id:'2.7',t:'¿El personal eventual o de temporada tiene un contrato diferente al del personal fijo?',r:'A',tech:'Contrato por temporada — Arts. 39-F LFT',dep:'2.1'},
{id:'2.8',t:'¿Cada trabajador tiene una copia firmada de su contrato y usted conserva la suya?',r:'M',tech:'Duplicado — Art. 24 LFT',dep:'2.1'},
{id:'2.9',t:'¿Los contratos tienen alguna cláusula de período de prueba para los nuevos empleados?',r:'M',tech:'Período de prueba — Arts. 39-A a 39-F LFT',dep:'2.1'},
]},
{id:3,title:'Reglas internas del negocio',desc:'Cómo están formalizadas las normas de conducta y organización',
qs:[
{id:'3.1',t:'¿Tiene un reglamento interno de trabajo escrito para su negocio?',r:'A',tech:'Reglamento Interior de Trabajo — Art. 422 LFT',note:'¿Tiene algo parecido aunque sea informal?'},
{id:'3.2',t:'¿Ese reglamento fue entregado y firmado por cada uno de sus trabajadores?',r:'M',tech:'Acuse de recibo RIT — Art. 425 LFT',note:'¿Saben sus trabajadores que existe un reglamento?'},
{id:'3.3',t:'¿Su negocio tiene una comisión o representante de seguridad en el trabajo?',r:'A',tech:'Comisión de Seguridad e Higiene — NOM-019-STPS',note:'¿Quién se encarga de los temas de seguridad actualmente?'},
{id:'3.4',t:'¿Tiene algo organizado para la capacitación del personal: cursos, entrenamientos, certificaciones?',r:'A',tech:'Comisión Mixta Capacitación — Art. 153-E LFT',note:'¿Qué tipo de capacitación han recibido?'},
{id:'3.5',t:'¿Hay alguien designado para atender quejas del personal sobre mal ambiente o maltrato en el trabajo?',r:'A',tech:'NOM-035-STPS-2018 · Protocolo hostigamiento Art. 132 fr. XXXI',note:'¿Cómo se manejan actualmente esas situaciones?'},
]},
{id:4,title:'Horarios y días de trabajo',desc:'Cómo están organizados los turnos y los descansos',
qs:[
{id:'4.1',t:'¿Los horarios de cada turno están definidos y el personal los conoce con anticipación?',r:'A',tech:'Jornada — Arts. 58-68 LFT',note:'¿Cómo se comunican los horarios actualmente?'},
{id:'4.2',t:'¿Lleva algún registro de entradas y salidas de su personal (tarjeta, app, hoja, checador)?',r:'A',tech:'Control de asistencia — evidencia documental',note:'¿Qué sistema utiliza actualmente?'},
{id:'4.3',t:'¿Guarda esos registros de asistencia por al menos un año?',r:'M',tech:'Conservación de evidencia',note:'¿Cuánto tiempo los conserva?'},
{id:'4.4',t:'¿Cuando alguien trabaja horas extra, lo autoriza por escrito y queda registrado?',r:'A',tech:'Tiempo extraordinario — Arts. 66-67 LFT',note:'¿Cómo se manejan actualmente las horas extra?'},
{id:'4.5',t:'¿Todo su personal descansa al menos un día por cada seis que trabaja?',r:'A',tech:'Descanso semanal — Art. 69 LFT',note:'¿Hay personal que trabaja los siete días?'},
{id:'4.6',t:'¿Cuando alguien falta, le piden un justificante (incapacidad del IMSS, nota médica)?',r:'M',tech:'Justificación de ausencias',note:'¿Cómo manejan las ausencias actualmente?'},
]},
{id:5,title:'Sueldos y pagos',desc:'Cómo está organizada la nómina y los beneficios del personal',
qs:[
{id:'5.1',t:'¿Todos sus trabajadores ganan igual o más que el salario mínimo vigente?',r:'A',tech:'Salario mínimo — Art. 90 LFT',note:'¿Algún puesto está por debajo del mínimo?'},

let cur=0;
const A={}, N={}, PT={}, DC={};
let persona='', finalNotes='';

// ══════════════════════════════════════════════════════
// HELPERS PUROS
// ══════════════════════════════════════════════════════
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const skip=q=>q.dep&&A[q.dep]==='no';
const totalPt=()=>Object.values(PT).reduce((s,v)=>s+(parseInt(v)||0),0);
const answeredCount=()=>{
  let n=0;
  BLOCKS.forEach(b=>b.qs.forEach(q=>{
    if(skip(q))return;
    if(q.tipo==='persona'&&persona)n++;
    else if(q.tipo==='puestos'&&totalPt()>0)n++;
    else if(!q.tipo&&A[q.id])n++;
  }));
  return n;
};
const visibleCount=()=>BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!skip(q)).length,0);
const blkAnswered=b=>b.qs.filter(q=>{
  if(skip(q))return true;
  if(q.tipo==='persona')return!!persona;
  if(q.tipo==='puestos')return totalPt()>0;
  return!!A[q.id];
}).length;
const blkRisk=b=>{
  const hasA=b.qs.some(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='medias')&&q.r==='A');
  const midN=b.qs.filter(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='medias')&&q.r==='M').length;
  if(hasA)return'A';
  if(midN>1)return'M';
  if(!b.qs.some(q=>A[q.id]||q.tipo))return null;
  return'B';
};

function buildTabs(){
  const c=document.getElementById('tabs');
  let h='';
  BLOCKS.forEach((b,i)=>{h+=`<button type="button" class="tab" id="tab-${i}" onclick="go(${i})"><span class="tab-dot" id="tdot-${i}"></span>${b.id}. ${b.title}</button>`;});
  h+=`<button type="button" class="tab" id="tab-${BLOCKS.length}" onclick="go(${BLOCKS.length})"><span class="tab-dot"></span>Diagnóstico</button>`;
  c.innerHTML=h;
}

        <div class="pc-sub">SA de CV, SRL, AC, etc.</div>
      </div>
      <div class="pc${pf?' sel':''}" id="pcard-pf" onclick="selPersona('pf')">
        <div class="pc-icon">👤</div>
        <div class="pc-title">Persona Física</div>
        <div class="pc-sub">Con Actividad Empresarial</div>

    </div>

      </div>
      <div class="pf-g">
        <label class="pf-lbl" for="pd-rfc">RFC</label>
        <input class="pf-in" id="pd-rfc" type="text" placeholder="${persona==='pm'?'Ej. RCE850301ABC':'Ej. PEGJ850301XYZ'}" value="${esc(PD.rfc)}" style="text-transform:uppercase" oninput="pdSet('rfc',this.value.toUpperCase())">
      </div>
      <div class="pf-g">
        <label class="pf-lbl" for="pd-reg">Régimen fiscal</label>
        <input class="pf-in" id="pd-reg" type="text" placeholder="Ej. General de Ley, RESICO..." value="${esc(PD.regimen)}" oninput="pdSet('regimen',this.value)">

      ${persona==='pm'?`<div class="pf-g full" id="rep-grp">

function htmlPuestos(){
  let rows='';
  PUESTOS.forEach(p=>{
    const v=PT[p.id]||0;
    rows+=`<div class="pt-row">
      <span class="pt-lbl">${esc(p.n)}</span>
      <div class="pt-ctrl">
        <button type="button" class="pt-btn" onclick="adjPT('${p.id}',-1)">−</button>
        <input type="number" class="pt-num" id="pt-${p.id}" min="0" max="99" value="${v}" oninput="setPT('${p.id}',this.value)">
        <button type="button" class="pt-btn" onclick="adjPT('${p.id}',1)">+</button>
      </div>
    </div>`;
  });
  const tot=totalPt();
  return`<div class="puestos-wrap" id="card-1.2">
    <div class="puestos-hdr">
      <span class="qc-num">1.2</span>
      <span class="qc-txt">¿Cuántas personas trabajan en su negocio en este momento?</span>
    </div>
    <div class="puestos-grid">${rows}</div>
    <div class="pt-total">
      <span>Total en plantilla</span>
      <span id="pt-tot">${tot} persona${tot!==1?'s':''}</span>
    </div>
  </div>`;
}

function htmlQ(q){
  const sk=skip(q);
  const v=A[q.id]||'';
  const showN=!sk&&(v==='no'||v==='medias');
  return`<div class="qc${sk?' skipped':v?' '+v:''}" id="qcard-${q.id}">
    <div class="qc-body">
      <div class="qc-hdr">
        <span class="qc-num">${esc(q.id)}</span>
        <span class="qc-txt">${esc(q.t)}</span>
      </div>
      ${sk?`<div style="font-size:12px;color:var(--amber);padding:4px 0 6px">— No aplica: no hay contratos escritos</div>`:''}
      ${!sk?`<div class="ans-row">
        <button type="button" class="ab${v==='si'?' si':''}" id="ab-${q.id}-si" onclick="setA('${q.id}','si')">✓ Sí</button>
        <button type="button" class="ab${v==='no'?' no':''}" id="ab-${q.id}-no" onclick="setA('${q.id}','no')">✗ No</button>
        <button type="button" class="ab${v==='medias'?' medias':''}" id="ab-${q.id}-medias" onclick="setA('${q.id}','medias')">~ A medias</button>
      </div>`:''}
    </div>
    ${!sk?`<div class="qnotes${showN?' show':''}" id="qnotes-${q.id}">
      <div class="qnotes-lbl">${q.note||'Cuéntenos más'}</div>
      <div class="qnotes"><textarea placeholder="Escriba aquí los detalles..." onchange="N['${q.id}']=this.value" oninput="ar(this)">${esc(N[q.id]||'')}</textarea></div>
    </div>`:''}
  </div>`;
}

function htmlBlock(b){
  const ba=blkAnswered(b),bt=b.qs.length,pct=Math.round((ba/bt)*100);
  const skipB=b.id===2&&A['2.1']==='no';
  let qhtml='';
  b.qs.forEach(q=>{
    if(q.tipo==='persona')qhtml+=htmlPersona();
    else if(q.tipo==='puestos')qhtml+=htmlPuestos();
    else qhtml+=htmlQ(q);
  });
  return`<div class="blk-hd">
    <span class="blk-badge">Tema ${b.id} de ${BLOCKS.length}</span>
    <div class="blk-title">${esc(b.title)}</div>
    <div class="blk-desc">${esc(b.desc)}</div>
    <div class="blk-prog">
      <div class="blk-prog-bar"><div class="blk-prog-fill" id="bpf" style="width:${pct}%"></div></div>
      <div class="blk-prog-lbl" id="bpl">${ba} / ${bt} preguntas</div>
    </div>
  </div>
  ${skipB?`<div class="skip-notice">Las preguntas siguientes sobre contratos se omiten porque indicó que no hay contratos firmados.</div>`:''}
  ${qhtml}`;
}

function htmlSummary(){
  const allQ=BLOCKS.flatMap(b=>b.qs).filter(q=>!q.tipo&&!skip(q));
  const issues=allQ.filter(q=>A[q.id]==='no'||A[q.id]==='medias');
  const hi=issues.filter(q=>q.r==='A'),mi=issues.filter(q=>q.r==='M');
  let h=`<div class="sum-hero">
    <h2>Resumen del diagnóstico</h2>
    <div class="sum-stats">
      <div class="ss"><div class="ss-v">${answeredCount()}</div><div class="ss-l">Preguntas atendidas</div></div>
      <div class="ss"><div class="ss-v${issues.length?' r':''}">${issues.length}</div><div class="ss-l">Áreas de atención</div></div>
      <div class="ss"><div class="ss-v${hi.length?' r':''}">${hi.length}</div><div class="ss-l">Prioridad alta</div></div>
      <div class="ss"><div class="ss-v${mi.length?' a':''}">${mi.length}</div><div class="ss-l">Prioridad media</div></div>
    </div>
  </div>`;
  // Semáforo
  h+=`<div class="sum-card"><div class="sum-card-hd">Estado por tema — clic para ir al tema</div>`;
  BLOCKS.forEach((b,i)=>{
    const r=blkRisk(b);
    const bi=b.qs.filter(q=>!skip(q)&&(A[q.id]==='no'||A[q.id]==='medias')).length;
    h+=`<div class="sem-row" onclick="go(${i})">
      <div class="sem-blk"><div class="sem-blk-n">Tema ${b.id}</div><div class="sem-blk-t">${esc(b.title)}</div></div>
      <div style="font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap">${bi>0?bi+' a revisar':''}</div>
      <span class="sbadge ${r?'sbadge-'+r:'sbadge-n'}">${r?{A:'ALTO',M:'MEDIO',B:'BAJO'}[r]:'Sin responder'}</span>
    </div>`;
  });
  h+=`</div>`;
  if(hi.length){
    h+=`<div class="sum-card"><div class="sum-card-hd" style="color:var(--red)">Atención inmediata — Riesgo alto</div>`;
    hi.forEach(q=>{
      h+=`<div class="issue-row">
        <div class="ibadge ibadge-A">ALTO</div>
        <div>
          <div class="issue-id">${esc(q.id)} · ${esc(q.tech||'')}</div>
          <div class="issue-t">${esc(q.t)}</div>
          ${N[q.id]?`<div class="issue-note">↳ ${esc(N[q.id])}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  if(mi.length){
    h+=`<div class="sum-card"><div class="sum-card-hd" style="color:var(--amber)">Seguimiento — Riesgo medio</div>`;
    mi.forEach(q=>{
      h+=`<div class="issue-row">
        <div class="ibadge ibadge-M">MEDIO</div>
        <div>
          <div class="issue-id">${esc(q.id)} · ${esc(q.tech||'')}</div>
          <div class="issue-t">${esc(q.t)}</div>
          ${N[q.id]?`<div class="issue-note">↳ ${esc(N[q.id])}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="sum-card"><div class="sum-card-hd">Paquetería necesaria</div><div class="doc-grid">`;
  DOCS.forEach((d,i)=>{h+=`<label class="doc-item${DC[i]?' chk':''}"><input type="checkbox" ${DC[i]?'checked':''} onchange="setDC(${i},this.checked)"><span>${esc(d)}</span></label>`;});
  h+=`</div></div>`;
  h+=`<div class="sum-card"><div class="sum-card-hd">Observaciones y estrategia — uso del despacho</div>
    <div class="sum-notes"><textarea placeholder="Contingencia más urgente · Estrategia · Honorarios · Fecha de inicio..." onchange="finalNotes=this.value" oninput="ar(this)">${esc(finalNotes)}</textarea></div>
    <div class="sum-actions">
      <button type="button" class="s-btn s-btn-sec" onclick="window.print()">🖨 Imprimir / PDF</button>
      <button type="button" class="s-btn s-btn-pri" onclick="if(confirm('¿Reiniciar el diagnóstico?')){location.reload();}">Nuevo diagnóstico</button>
    </div></div>`;
  return h;
}

// ══════════════════════════════════════════════════════
// RENDER — solo en init y go()
// ══════════════════════════════════════════════════════
function showBlock(){
  const m=document.getElementById('main');
  m.innerHTML=cur===BLOCKS.length?htmlSummary():htmlBlock(BLOCKS[cur]);
  m.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
}

function go(i){
  cur=Math.max(0,Math.min(BLOCKS.length,i));
  showBlock();
  paintTabs();
  updateNav();
  updateProg();
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('tab-'+cur)?.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

function init(){
  buildTabs();
  paintTabs();
  showBlock();
  updateProg();
  updateNav();
}

// ══════════════════════════════════════════════════════
// ACCIONES — SOLO mutaciones quirúrgicas, NUNCA innerHTML
// ══════════════════════════════════════════════════════
function setA(id,val){
  A[id]=val;
  // Pivote 2.1 — necesita re-render para el banner, restauramos scroll
  if(id==='2.1'){
    const sy=window.scrollY;
    showBlock();
    requestAnimationFrame(()=>window.scrollTo({top:sy,behavior:'instant'}));
    paintTabs();updateProg();
    return;
  }
  // Todas las demás: mutación quirúrgica
  const card=document.getElementById('qcard-'+id);
  if(card) card.className='qc '+val;
  ['si','no','medias'].forEach(opt=>{
    const btn=document.getElementById('ab-'+id+'-'+opt);
    if(btn) btn.className='ab'+(val===opt?' '+opt:'');
  });
  const nd=document.getElementById('qnotes-'+id);
  if(nd) nd.className='qnotes'+(val==='no'||val==='medias'?' show':'');
  // barra de progreso del bloque
  if(cur<BLOCKS.length){
    const b=BLOCKS[cur],ba=blkAnswered(b),pct=Math.round((ba/b.qs.length)*100);
    const bf=document.getElementById('bpf'),bl=document.getElementById('bpl');
    if(bf)bf.style.width=pct+'%';
    if(bl)bl.textContent=`${ba} / ${b.qs.length} preguntas`;
  }
  paintTabs();updateProg();
}

function selPersona(tipo){
  persona=tipo;
  // solo mutar clases de las tarjetas
  ['pm','pf'].forEach(t=>{
    const c=document.getElementById('pcard-'+t);
    if(c)c.className='pc'+(tipo===t?' sel':'');
  });
  // actualizar label y placeholder del nombre
  const lNombre=document.querySelector('label[for="pd-nombre"]');
  if(lNombre)lNombre.textContent=tipo==='pm'?'Nombre de la empresa':'Su nombre completo';
  const iNombre=document.getElementById('pd-nombre');
  if(iNombre)iNombre.placeholder=tipo==='pm'?'Ej. Restaurantes del Centro SA de CV':'Ej. Juan Pérez García';
  const iRfc=document.getElementById('pd-rfc');
  if(iRfc)iRfc.placeholder=tipo==='pm'?'Ej. RCE850301ABC':'Ej. PEGJ850301XYZ';
  // campo representante: añadir/quitar sin reemplazar nada más
  const repGrp=document.getElementById('rep-grp');
  const pfields=document.querySelector('.persona-fields');
  if(tipo==='pm'&&!repGrp&&pfields){
    const d=document.createElement('div');
    d.className='pf-g full';d.id='rep-grp';
    d.innerHTML='<label class="pf-lbl" for="pd-rep">Representante legal</label><input class="pf-in" id="pd-rep" type="text" placeholder="Nombre completo de quien representa a la empresa" oninput="pdSet(\'representante\',this.value)">';
    pfields.appendChild(d);
  }else if(tipo==='pf'&&repGrp){repGrp.remove();}
  updateProg();paintTabs();
}

function pdSet(field,val){PD[field]=val;}

function adjPT(id,delta){
  const inp=document.getElementById('pt-'+id);
  if(!inp)return;
  const nv=Math.max(0,(parseInt(inp.value)||0)+delta);
  inp.value=nv;PT[id]=nv;updPTTotal();
}
function setPT(id,val){PT[id]=Math.max(0,parseInt(val)||0);updPTTotal();}
function updPTTotal(){
  const el=document.getElementById('pt-tot'),tot=totalPt();
  if(el)el.textContent=`${tot} persona${tot!==1?'s':''}`;
  updateProg();paintTabs();
}

function setDC(i,v){
  DC[i]=v;
  const items=document.querySelectorAll('.doc-item');
  if(items[i])items[i].className='doc-item'+(v?' chk':'');
}

// ══════════════════════════════════════════════════════
// ACTUALIZADORES LIGEROS
// ══════════════════════════════════════════════════════
function updateProg(){
  const ac=answeredCount(),tot=visibleCount(),pct=tot>0?Math.round((ac/tot)*100):0;
  const gp=document.getElementById('gp'),gc=document.getElementById('gpct');
  if(gp)gp.style.width=pct+'%';
  if(gc)gc.textContent=pct+'%';
}
function paintTabs(){
  BLOCKS.forEach((b,i)=>{
    const t=document.getElementById('tab-'+i),d=document.getElementById('tdot-'+i);
    if(!t)return;
    const r=blkRisk(b),done=blkAnswered(b)===b.qs.length;
    t.className='tab'+(cur===i?' active':r==='A'?' warn':done?' done':'');
    if(d)d.style.background=r==='A'?'var(--red)':r==='M'?'var(--amber)':done?'var(--green)':'transparent';
  });
  const st=document.getElementById('tab-'+BLOCKS.length);
  if(st)st.className='tab'+(cur===BLOCKS.length?' active':'');
}
function updateNav(){
  const prev=document.getElementById('btnPrev'),next=document.getElementById('btnNext'),lbl=document.getElementById('navLbl');
  if(prev)prev.disabled=(cur===0);
  if(next){
    if(cur===BLOCKS.length){next.textContent='Reiniciar';next.onclick=()=>{if(confirm('¿Reiniciar el diagnóstico?'))location.reload();};}
    else{next.textContent='Siguiente →';next.onclick=()=>go(cur+1);}
  }
  if(lbl)lbl.innerHTML=cur===BLOCKS.length?'<strong>Diagnóstico final</strong>':`<strong>${BLOCKS[cur].title}</strong><br>Tema ${BLOCKS[cur].id} de ${BLOCKS.length}`;
}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagnóstico Laboral — Abogados MYA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1B3A6B;--mid:#2E5FA3;--light:#EAF1FB;
  --red:#C0392B;--red-lt:#FCEBEB;--red-txt:#A32D2D;
  --amber:#D68910;--amber-lt:#FAEEDA;--amber-txt:#854F0B;
  --green:#1E8449;--green-lt:#D5F5E3;--green-txt:#1A5C32;
  --gray:#F4F4F4;--border:#D8D8D8;--text:#1A1A1A;--muted:#666;
  --font:'Georgia',serif;--sans:'Helvetica Neue',Arial,sans-serif;
  --radius:8px
}
body{font-family:var(--font);background:#F8F8F6;color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.site-header{background:var(--dark);color:#fff;padding:0}
.header-inner{max-width:960px;margin:0 auto;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.header-brand{display:flex;flex-direction:column}
.header-firm{font-family:var(--sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9CB8D8;margin-bottom:2px}
.header-title{font-size:20px;font-weight:400;color:#fff}
.header-sub{font-family:var(--sans);font-size:12px;color:#9CB8D8;margin-top:2px}
.header-links a{font-family:var(--sans);font-size:12px;color:#9CB8D8}
.header-links a:hover{color:#fff;text-decoration:none}
.main{max-width:960px;margin:0 auto;padding:28px 24px 60px}
.hero{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:24px}
.hero-title{font-size:22px;font-weight:400;color:var(--dark);margin-bottom:6px}
.hero-desc{font-size:13px;color:var(--muted);max-width:640px;line-height:1.7;margin-bottom:16px}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap}
.hero-badge{font-family:var(--sans);font-size:11px;padding:4px 12px;border-radius:20px;background:var(--light);color:var(--mid);border:1px solid #C5D9EF}
.progress-section{margin-bottom:20px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-family:var(--sans);font-size:12px;color:var(--muted)}
.progress-pct{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--dark)}
.progress-bar{height:6px;background:#E0E0E0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--dark);border-radius:3px;transition:width .4s ease}
.stepper{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.step-btn{font-family:var(--sans);font-size:11px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s;white-space:nowrap}
.step-btn:hover{border-color:var(--mid);color:var(--mid)}
.step-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.step-btn.done{border-color:var(--dark);color:var(--dark)}
.step-btn.warn{border-color:var(--red);color:var(--red)}
.block-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.block-header{padding:16px 24px 14px;border-bottom:1px solid var(--border);background:linear-gradient(to right,var(--light),#fff)}
.block-num{font-family:var(--sans);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);margin-bottom:3px}
.block-title{font-size:17px;font-weight:400;color:var(--dark);margin-bottom:2px}
.block-desc{font-size:12px;color:var(--muted);font-style:italic}
.block-prog{height:3px;background:#E0E0E0}
.block-prog-fill{height:100%;background:var(--mid);transition:width .3s}
.col-heads{display:grid;grid-template-columns:40px 1fr 70px 70px 90px 70px;gap:6px;padding:8px 24px 6px;border-bottom:1px solid #F0F0F0;background:#FAFAFA}
.col-h{font-family:var(--sans);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center}
.col-h:nth-child(2){text-align:left}
@media(max-width:640px){.col-heads{display:none}}
.q-row{padding:14px 24px;border-bottom:1px solid #F5F5F5;transition:background .1s}
.q-row:last-child{border-bottom:none}
.q-row:hover{background:#FAFAFA}
.q-row.skipped{opacity:.45;pointer-events:none;background:#FAFAFA}
.q-grid{display:grid;grid-template-columns:40px 1fr 70px 70px 90px 70px;gap:6px;align-items:start}
@media(max-width:640px){.q-grid{grid-template-columns:1fr;gap:8px}}
.q-id{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--mid);padding-top:2px}
.q-text{font-size:13px;color:var(--text);line-height:1.55}
.q-hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.q-opt{display:flex;flex-direction:column;align-items:center;gap:3px}
.q-opt label{font-family:var(--sans);font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.q-opt input[type=radio]{accent-color:var(--dark);cursor:pointer;width:13px;height:13px}
.risk-pill{text-align:center;align-self:center;padding:3px 8px;border-radius:12px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.04em}
.risk-A{background:var(--red-lt);color:var(--red-txt)}
.risk-M{background:var(--amber-lt);color:var(--amber-txt)}
.risk-B{background:var(--green-lt);color:var(--green-txt)}
.q-notes-row{margin-top:8px;padding-left:46px}
@media(max-width:640px){.q-notes-row{padding-left:0}}
.q-notes-row textarea{width:100%;font-family:var(--font);font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:#FAFAFA;color:var(--text);resize:none;line-height:1.5;transition:border .15s}
.q-notes-row textarea:focus{outline:none;border-color:var(--mid);background:#fff}
/* ESPECIALES 1.1 y 1.2 */
.q-special{padding:14px 24px;border-bottom:1px solid #F5F5F5}
.q-special:hover{background:#FAFAFA}
.special-grid{display:grid;grid-template-columns:40px 1fr;gap:8px;align-items:start}
.special-body{display:flex;flex-direction:column;gap:10px}
.special-label{font-size:13px;color:var(--text);line-height:1.55;font-weight:400}
.special-hint{font-size:11px;color:var(--muted);font-style:italic}
.radio-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.radio-group label{font-family:var(--sans);font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;transition:all .15s}
.radio-group label:hover{border-color:var(--mid)}
.radio-group input[type=radio]{accent-color:var(--dark);width:13px;height:13px}
.radio-group label.selected{border-color:var(--dark);background:var(--light);color:var(--dark);font-weight:600}
.puestos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:6px}
.puesto-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border:1px solid var(--border);border-radius:6px;background:#FAFAFA;transition:border .15s}
.puesto-row:focus-within{border-color:var(--mid);background:#fff}
.puesto-name{font-family:var(--sans);font-size:12px;color:var(--text)}
.puesto-input{width:52px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--dark);text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px 6px;background:#fff}
.puesto-input:focus{outline:none;border-color:var(--dark)}
.puesto-total{font-family:var(--sans);font-size:11px;color:var(--muted);margin-top:4px}
/* SKIP BANNER */
.skip-banner{margin:0 24px 14px;padding:12px 16px;background:#FFF8E1;border:1px solid #F9C922;border-radius:6px;display:flex;align-items:flex-start;gap:10px}
.skip-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.skip-text{font-size:12px;color:#7D5A00;line-height:1.5}
.skip-text strong{font-weight:600}
/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 0 0}
.nav-btn{font-family:var(--sans);font-size:13px;padding:9px 22px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;color:var(--text);transition:all .15s}
.nav-btn:hover{background:var(--gray)}
.nav-btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
.nav-btn.primary:hover{background:var(--mid)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-center{font-family:var(--sans);font-size:12px;color:var(--muted);text-align:center}
/* SUMMARY */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:640px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat-label{font-family:var(--sans);font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:26px;font-weight:400;color:var(--dark)}
.stat-val.red{color:var(--red-txt)}
.stat-val.amber{color:var(--amber-txt)}
.semaforo-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px}
.semaforo-table th{font-family:var(--sans);font-size:11px;text-align:left;padding:8px 14px;background:var(--dark);color:#fff;font-weight:500}
.semaforo-table td{padding:9px 14px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.semaforo-table tr:last-child td{border-bottom:none}
.semaforo-table tr:hover td{background:#FAFAFA}
.badge-risk{display:inline-block;padding:3px 10px;border-radius:12px;font-family:var(--sans);font-size:10px;font-weight:600}
.badge-A{background:var(--red-lt);color:var(--red-txt)}
.badge-M{background:var(--amber-lt);color:var(--amber-txt)}
.badge-B{background:var(--green-lt);color:var(--green-txt)}
.badge-none{background:var(--gray);color:var(--muted)}
.issue-item{padding:10px 14px;margin-bottom:6px;border-left:3px solid;border-radius:0 6px 6px 0}
.issue-A{border-color:var(--red);background:var(--red-lt)}
.issue-M{border-color:var(--amber);background:var(--amber-lt)}
.issue-num{font-family:var(--sans);font-size:11px;font-weight:600;margin-bottom:2px}
.issue-A .issue-num{color:var(--red-txt)}
.issue-M .issue-num{color:var(--amber-txt)}
.issue-txt{font-size:13px;color:var(--text)}
.issue-note{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic}
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
@media(max-width:500px){.doc-grid{grid-template-columns:1fr}}
.doc-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff}
.doc-row.check input{accent-color:var(--dark)}
.sum-section-title{font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.notes-final{width:100%;font-family:var(--font);font-size:13px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#FAFAFA;color:var(--text);min-height:100px;resize:vertical;line-height:1.6}
.notes-final:focus{outline:none;border-color:var(--mid);background:#fff}
.print-btn{font-family:var(--sans);font-size:12px;padding:8px 18px;border:1px solid var(--mid);border-radius:6px;cursor:pointer;background:#fff;color:var(--mid);display:flex;align-items:center;gap:6px}
.print-btn:hover{background:var(--light)}
.summary-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px}
.site-footer{background:var(--dark);color:#9CB8D8;padding:20px 24px;text-align:center;font-family:var(--sans);font-size:11px;margin-top:40px}
@media print{
  .site-header,.stepper,.nav-row,.print-btn,.header-links{display:none!important}
  .block-card{break-inside:avoid;border:1px solid #ccc}
  body{background:#fff}
  .main{padding:10px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-firm">Abogados MYA</div>
      <div class="header-title">Diagnóstico de Cumplimiento Laboral</div>
      <div class="header-sub">Evaluación inicial · Restaurante-Bar · Guadalajara, Jalisco</div>
    </div>
    <div class="header-links">
      <a href="https://finiquito-laboral.netlify.app">← Calculadora de Finiquito</a>
    </div>
  </div>
</header>

<main class="main" id="app"></main>

<footer class="site-footer">
  Abogados MYA · Av. Américas 1501, Piso 20-A · Guadalajara, Jalisco · contacto@abogadosmya.com
</footer>

<script>
const PUESTOS=[
  {id:'hostess',nombre:'Hostess / Recepcionista'},
  {id:'mesero',nombre:'Mesero / Mesera'},
  {id:'chef',nombre:'Chef / Jefe de Cocina'},
  {id:'cocinero',nombre:'Cocinero / Cocinera'},
  {id:'barman',nombre:'Barman / Bartender'},
  {id:'cajero',nombre:'Cajero / Cajera'},
  {id:'limpieza',nombre:'Personal de Limpieza'},
  {id:'temporada',nombre:'Personal de Temporada'},
  {id:'gerente',nombre:'Gerente / Encargado'},
  {id:'otro',nombre:'Otro puesto'},
];

const BLOCKS=[
{id:1,title:"Datos generales y estructura operativa",desc:"Caracterización del negocio para dimensionar el diagnóstico",
qs:[
{id:"1.1",t:"Tipo de persona jurídica del patrón",r:"B",tipo:"persona",h:"Determina obligaciones fiscales y de registro"},
{id:"1.2",t:"Personal que labora actualmente en el establecimiento",r:"B",tipo:"puestos",h:"Indique el número de personas por puesto"},
{id:"1.3",t:"¿Tiene registro patronal vigente ante el IMSS?",r:"A"},
{id:"1.4",t:"¿Cuenta con licencia de funcionamiento y permiso de venta de alcohol vigentes?",r:"A",h:"Su ausencia agrava el riesgo en inspecciones conjuntas STPS/Cofepris"},
{id:"1.5",t:"¿Existe organigrama o estructura de puestos definida formalmente?",r:"B"},
{id:"1.6",t:"¿Hay más de un turno de trabajo operando simultáneamente o en forma rotatoria?",r:"B"},
{id:"1.7",t:"¿Ha recibido visitas de inspección de la STPS, IMSS o Cofepris en los últimos 3 años?",r:"M",h:"Anote resultados y observaciones en notas"},
{id:"1.8",t:"¿Existe algún juicio o procedimiento laboral activo (demanda, conciliación, amparo)?",r:"A",h:"Anote número de asuntos, instancia y estado procesal en notas"},
]},
{id:2,title:"Contratos individuales de trabajo",desc:"Art. 25 LFT — Contenido mínimo obligatorio",
qs:[
{id:"2.1",t:"¿Todo el personal activo cuenta con contrato individual de trabajo por escrito?",r:"A",h:"La ausencia genera presunción de las condiciones más favorables al trabajador",pivote:true},
{id:"2.2",t:"¿Los contratos especifican el tipo correcto de relación: tiempo indeterminado, temporada o determinado según la función real?",r:"A",h:"Contratos a plazo fijo para funciones permanentes son nulos y revierten a tiempo indeterminado",depende:"2.1"},
{id:"2.3",t:"¿Los contratos contienen el contenido mínimo del Art. 25 LFT: datos del trabajador, puesto, jornada, salario, lugar y día de pago?",r:"A",depende:"2.1"},
{id:"2.4",t:"¿Los contratos regulan el período de prueba conforme a los Arts. 39-A al 39-F LFT?",r:"M",h:"Verificar plazo, alta IMSS desde primer día y no reiteración",depende:"2.1"},
{id:"2.5",t:"¿Los contratos de cocina, barra y piso contienen cláusula de propinas con componente de integración para el SDI ante el IMSS?",r:"A",h:"Sin esta cláusula el SDI puede estar subdeclarado en todos los meseros y bartenders",depende:"2.1"},
{id:"2.6",t:"¿Los contratos del chef y personal de confianza incluyen cláusula de confidencialidad con vigencia post-laboral?",r:"A",depende:"2.1"},
{id:"2.7",t:"¿Los contratos del cajero incluyen protocolo de responsabilidad por valores y prohibición de descuentos sin soporte documental?",r:"A",h:"Sin esto, cualquier descuento por faltantes es potencialmente ilegal",depende:"2.1"},
{id:"2.8",t:"¿Los contratos regulan el uso de herramientas tecnológicas (WhatsApp institucional, POS, plataformas de reservaciones)?",r:"M",depende:"2.1"},
{id:"2.9",t:"¿El personal de temporada tiene contratos por temporada debidamente justificados y no contratos a tiempo determinado improcedentes?",r:"A",depende:"2.1"},
{id:"2.10",t:"¿Cada trabajador conserva un ejemplar de su contrato y el patrón tiene el acuse de recibo en el expediente?",r:"M",depende:"2.1"},
]},
{id:3,title:"Reglamento Interior de Trabajo y comisiones",desc:"Arts. 422-425 y 509-512 LFT · NOM-019 · NOM-035",
qs:[
{id:"3.1",t:"¿Cuenta con Reglamento Interior de Trabajo elaborado por Comisión Mixta?",r:"A",h:"Sin RIT el patrón carece de base para aplicar medidas disciplinarias válidamente"},
{id:"3.2",t:"¿El RIT fue depositado ante el CFCRL y se conserva el acuse de depósito?",r:"A",h:"El RIT no depositado no es oponible al trabajador ni a la autoridad"},
{id:"3.3",t:"¿El RIT está fijado en lugares visibles del establecimiento con constancia de fijación?",r:"A"},
{id:"3.4",t:"¿Se entregó un ejemplar del RIT a cada trabajador con acuse de recibo en su expediente?",r:"M"},
{id:"3.5",t:"¿El RIT cubre las materias mínimas del Art. 423 LFT: jornada, descansos, faltas, sanciones, higiene, exámenes médicos, uso de asientos?",r:"A"},
{id:"3.6",t:"¿El RIT contiene disposiciones específicas por área operativa (cocina, barra, caja, limpieza, piso)?",r:"M"},
{id:"3.7",t:"¿Existe Comisión de Seguridad e Higiene constituida con acta formal y registrada ante la STPS?",r:"A"},
{id:"3.8",t:"¿Existe Comisión Mixta de Capacitación, Adiestramiento y Productividad constituida con acta formal?",r:"A"},
{id:"3.9",t:"¿Existe responsable o comisión designada para la NOM-035-STPS-2018 con acta formal?",r:"A"},
{id:"3.10",t:"¿El RIT o sus anexos contienen protocolo de actuación frente a hostigamiento y acoso sexual (Art. 132, fr. XXXI LFT)?",r:"A"},
]},
{id:4,title:"Jornada, horario y registro de asistencia",desc:"Arts. 58-68 LFT — Base para cálculo de horas extra y rescisiones",
qs:[
{id:"4.1",t:"¿Los horarios de cada turno están definidos por escrito y son congruentes con el tipo de jornada pactado en los contratos?",r:"A"},
{id:"4.2",t:"¿Existe sistema de registro de asistencia (checador, huella, app) que genere evidencia documental?",r:"A",h:"Sin registro de asistencia es imposible acreditar faltas injustificadas en una rescisión"},
{id:"4.3",t:"¿Los registros de asistencia se conservan por al menos un año?",r:"M"},
{id:"4.4",t:"¿El tiempo extraordinario se autoriza por escrito antes de trabajarse y se registra en bitácora?",r:"A",h:"El tiempo extra no autorizado es igualmente pagable; la falta de registro agrava la contingencia"},
{id:"4.5",t:"¿El rol de turnos se publica con anticipación suficiente y existe evidencia de su comunicación al personal?",r:"M"},
{id:"4.6",t:"¿Existe procedimiento escrito para reportar ausencias y justificarlas con documento?",r:"M"},
{id:"4.7",t:"¿El personal descansa efectivamente un día por cada seis de trabajo o recibe el pago doble correspondiente?",r:"A"},
{id:"4.8",t:"¿El trabajo en días de descanso obligatorio (Art. 74 LFT) se retribuye con el pago triple que corresponde?",r:"A"},
]},
{id:5,title:"Salario, nómina, IMSS e INFONAVIT",desc:"Arts. 82-116 LFT · LSS · Ley INFONAVIT — Principal fuente de contingencia económica",
qs:[
{id:"5.1",t:"¿El salario de todos los trabajadores es igual o superior al salario mínimo general vigente?",r:"A"},
{id:"5.2",t:"¿El SDI declarado ante el IMSS incluye correctamente todas las prestaciones ordinarias: prima vacacional, aguinaldo proporcional, propinas y comisiones?",r:"A",h:"La subdeclaración del SDI genera multas IMSS, diferencias de cuotas y contingencia en indemnizaciones"},
{id:"5.3",t:"¿Todo el personal está dado de alta ante el IMSS desde el primer día de labores?",r:"A"},
{id:"5.4",t:"¿Las cuotas obrero-patronales al IMSS se pagan puntualmente y sin adeudos?",r:"A"},
{id:"5.5",t:"¿Las aportaciones al INFONAVIT y AFORE están al corriente?",r:"A"},
{id:"5.6",t:"¿Se emite CFDI de nómina en cada período de pago y se entrega al trabajador?",r:"A",h:"La omisión es infracción al CFF con multa independiente de la laboral"},
{id:"5.7",t:"¿El aguinaldo se paga antes del 20 de diciembre de cada año?",r:"A"},
{id:"5.8",t:"¿Las vacaciones y prima vacacional se otorgan conforme a la reforma de 2023 (mínimo 12 días al primer año)?",r:"A",h:"Verificar si se actualizaron contratos y política de vacaciones tras la reforma"},
{id:"5.9",t:"¿Existe política documentada para descuentos en nómina (anticipos, préstamos, faltantes de caja)?",r:"A",h:"Los descuentos sin soporte firmado son ilegales y generan contingencia de pago doble"},
{id:"5.10",t:"¿Los recibos de nómina o CFDI se conservan en el expediente por al menos 5 años?",r:"M"},
]},
{id:6,title:"Propinas — Régimen e integración salarial",desc:"Arts. 346-349 LFT — Área de mayor subdeclaración en el giro",
qs:[

const DOCS=[
"Contratos individuales — todos los puestos",
"Expedientes personales completos",
"Reglamento Interior de Trabajo",
"Actas de constitución de comisiones (5 actas)",
"Depósito del RIT ante el CFCRL",
"Acuses de recibo del RIT por trabajador",
"Programa Anual de Seguridad e Higiene",
"Formatos de recorrido de verificación",
"Plan y Programa de Capacitación (DC-1/DC-2)",
"Constancias de habilidades laborales (DC-3)",
"Política NOM-035 difundida con acuse",
"Protocolo anti-hostigamiento y acoso sexual",
"Formato de reporte de violencia y acoso",
"Avisos de Privacidad (clientes y personal)",
"Formatos disciplinarios (amonestación, suspensión, acta de hechos)",
"Aviso de rescisión — modelo base",
"Reporte de accidente de trabajo",
"Finiquito / liquidación — modelo base por puesto",
];

// STATE
let block=0;
const answers={};     // { qId: 'si'|'no'|'parcial'|'pm'|'pf' }
const puestosData={}; // { puestoId: numero }
const notes={};
const docChecks={};
let finalNotes='';

const totalQsCount=()=>{
  // contar solo preguntas visibles (no omitidas)
  return BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!isSkipped(q)).length,0);
};
function isSkipped(q){
  if(!q.depende) return false;
  const pivotVal=answers[q.depende];
  return pivotVal==='no';
}
function totalAnswered(){
  return BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]||q.tipo==='persona'&&answers['1.1']||q.tipo==='puestos'&&Object.values(puestosData).some(v=>v>0))).length,0);
}
function blockAnswered(b){
  return b.qs.filter(q=>{
    if(isSkipped(q))return true; // skipped counts as handled
    if(q.tipo==='persona') return !!answers['1.1'];
    if(q.tipo==='puestos') return Object.values(puestosData).some(v=>v>0);
    return !!answers[q.id];
  }).length;
}
function blockRisk(b){
  const nos=b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]==='no'||answers[q.id]==='parcial')&&q.r==='A').length;
  const meds=b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]==='no'||answers[q.id]==='parcial')&&q.r==='M').length;
  if(nos>0)return'A';
  if(meds>1)return'M';
  if(!b.qs.some(q=>answers[q.id]))return null;
  return'B';
}
function issueCount(){return BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]==='no'||answers[q.id]==='parcial')).length,0)}
function highRisk(){return BLOCKS.reduce((s,b)=>s+b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]==='no'||answers[q.id]==='parcial')&&q.r==='A').length,0)}
const RISK_LABEL={A:'ALTO',M:'MEDIO',B:'BAJO'};
function totalPuestos(){return Object.values(puestosData).reduce((s,v)=>s+(parseInt(v)||0),0);}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderPersonaQ(q){
  const v=answers['1.1']||'';
  return`<div class="q-special">
    <div class="special-grid">
      <div class="q-id">${esc(q.id)}</div>
      <div class="special-body">
        <div class="special-label">${esc(q.t)}</div>
        ${q.h?`<div class="special-hint">↳ ${esc(q.h)}</div>`:''}
        <div class="radio-group">
          <label class="${v==='pm'?'selected':''}">
            <input type="radio" name="1.1" value="pm" ${v==='pm'?'checked':''} onchange="setPersona('pm')">
            Persona Moral
          </label>
          <label class="${v==='pf'?'selected':''}">
            <input type="radio" name="1.1" value="pf" ${v==='pf'?'checked':''} onchange="setPersona('pf')">
            Persona Física c/Actividad Empresarial
          </label>
        </div>
        <div class="q-notes-row" style="padding-left:0;margin-top:4px">
          <textarea rows="1" placeholder="RFC, régimen fiscal, nombre del representante legal..." onchange="setNote('1.1',this.value)" oninput="autoResize(this)">${esc(notes['1.1']||'')}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function renderPuestosQ(q){
  const total=totalPuestos();
  let rows='';
  PUESTOS.forEach(p=>{
    const val=puestosData[p.id]||0;
    rows+=`<div class="puesto-row">
      <span class="puesto-name">${esc(p.nombre)}</span>
      <input class="puesto-input" type="number" min="0" max="99" value="${val}"
        onchange="setPuesto('${p.id}',this.value)" oninput="setPuesto('${p.id}',this.value)">
    </div>`;
  });
  return`<div class="q-special">
    <div class="special-grid">
      <div class="q-id">${esc(q.id)}</div>
      <div class="special-body">
        <div class="special-label">${esc(q.t)}</div>
        ${q.h?`<div class="special-hint">↳ ${esc(q.h)}</div>`:''}
        <div class="puestos-grid">${rows}</div>
        <div class="puesto-total" id="puesto-total">Total: <strong>${total}</strong> persona${total!==1?'s':''}</div>
        <div class="q-notes-row" style="padding-left:0;margin-top:4px">
          <textarea rows="1" placeholder="Observaciones sobre la plantilla..." onchange="setNote('1.2',this.value)" oninput="autoResize(this)">${esc(notes['1.2']||'')}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  const isSummary=block===BLOCKS.length;
  const ta=totalAnswered();
  const tq=totalQsCount();
  const pct=tq>0?Math.round((ta/tq)*100):0;

  let html=`
  <div class="hero">
    <div class="hero-title">Diagnóstico de cumplimiento normativo laboral</div>
    <div class="hero-desc">Evaluación inicial para restaurante-bar. Responda cada pregunta. El sistema genera automáticamente el semáforo de riesgo y la paquetería necesaria.</div>
    <div class="hero-meta">
      <span class="hero-badge">11 bloques temáticos</span>
      <span class="hero-badge">Mapa de riesgo automático</span>
      <span class="hero-badge">Uso exclusivo del despacho</span>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-top">
      <span class="progress-label" id="prog-label">${ta} de ${tq} preguntas atendidas</span>
      <span class="progress-pct" id="prog-pct">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="stepper">`;

  BLOCKS.forEach((b,i)=>{
    const r=blockRisk(b);
    let cls='step-btn';
    if(block===i)cls+=' active';
    else if(r==='A')cls+=' warn';
    else if(blockAnswered(b)===b.qs.length)cls+=' done';
    html+=`<button class="${cls}" onclick="goBlock(${i})">${b.id}. ${b.title.split(' ').slice(0,3).join(' ')}</button>`;
  });
  html+=`<button class="step-btn${isSummary?' active':''}" onclick="goBlock(${BLOCKS.length})">Diagnóstico final</button></div>`;

  if(!isSummary){
    const b=BLOCKS[block];
    const bPct=Math.round((blockAnswered(b)/b.qs.length)*100);
    // detectar si pivote de B2 está en 'no'
    const b2skip=b.id===2&&answers['2.1']==='no';
    const skippedCount=b2skip?b.qs.filter(q=>q.depende==='2.1').length:0;

    html+=`<div class="block-card">
      <div class="block-header">
        <div class="block-num">Bloque ${b.id} de ${BLOCKS.length}</div>
        <div class="block-title">${esc(b.title)}</div>
        <div class="block-desc">${esc(b.desc)}</div>
      </div>
      <div class="block-prog"><div class="block-prog-fill" style="width:${bPct}%"></div></div>`;

    // Mostrar banner de omisión si aplica
    if(b2skip){
      html+=`<div class="skip-banner">
        <div class="skip-icon">⚠</div>
        <div class="skip-text"><strong>Las preguntas 2.2 a 2.10 se omiten</strong> porque no existe contrato individual por escrito. Esto constituye por sí solo una contingencia de riesgo ALTO que genera la necesidad de elaborar contratos para todos los puestos activos.</div>
      </div>`;
    }

    // encabezados de columna solo si hay preguntas normales
    const hasNormalQs=b.qs.some(q=>!q.tipo&&!isSkipped(q));
    if(hasNormalQs){
      html+=`<div class="col-heads">
        <div class="col-h">#</div><div class="col-h">Pregunta</div>
        <div class="col-h">Sí</div><div class="col-h">No</div>
        <div class="col-h">Parcial</div><div class="col-h">Riesgo</div>
      </div>`;
    }

    b.qs.forEach(q=>{
      if(q.tipo==='persona'){html+=renderPersonaQ(q);return;}
      if(q.tipo==='puestos'){html+=renderPuestosQ(q);return;}

      const skipped=isSkipped(q);
      const v=answers[q.id]||'';
      html+=`<div class="q-row${skipped?' skipped':''}">
        <div class="q-grid">
          <div class="q-id">${esc(q.id)}</div>
          <div>
            <div class="q-text">${esc(q.t)}</div>
            ${q.h?`<div class="q-hint">↳ ${esc(q.h)}</div>`:''}
            ${skipped?`<div class="q-hint" style="color:var(--amber-txt)">↳ Omitida — sin contratos escritos</div>`:''}
          </div>
          ${['si','no','parcial'].map(opt=>`
          <div class="q-opt">
            <label><input type="radio" name="${q.id}" value="${opt}" ${v===opt?'checked':''} ${skipped?'disabled':''} onchange="setAnswer('${q.id}','${opt}')">
            ${opt.charAt(0).toUpperCase()+opt.slice(1)}</label>
          </div>`).join('')}
          <div class="risk-pill risk-${q.r}">${RISK_LABEL[q.r]}</div>
        </div>
        ${!skipped?`<div class="q-notes-row">
          <textarea rows="1" placeholder="Notas / detalle..." onchange="setNote('${q.id}',this.value)" oninput="autoResize(this)">${esc(notes[q.id]||'')}</textarea>
        </div>`:''}
      </div>`;
    });
    html+=`</div>`;
  } else {
    // SUMMARY
    const all=BLOCKS.flatMap(b=>b.qs).filter(q=>!isSkipped(q));
    const issues=all.filter(q=>answers[q.id]==='no'||answers[q.id]==='parcial');
    const highIssues=issues.filter(q=>q.r==='A');
    const midIssues=issues.filter(q=>q.r==='M');
    const ic=issueCount();
    const hr=highRisk();
    // añadir aviso de contratos si se omitió B2
    const sinContratos=answers['2.1']==='no';

    html+=`<div class="summary-card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div style="font-size:17px;font-weight:400;color:var(--dark)">Resumen del diagnóstico</div>
        <button class="print-btn" onclick="window.print()">Imprimir / Guardar PDF</button>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">Preguntas atendidas</div><div class="stat-val">${ta}/${tq}</div></div>
        <div class="stat-card"><div class="stat-label">Incumplimientos totales</div><div class="stat-val red">${ic}</div></div>
        <div class="stat-card"><div class="stat-label">Riesgo ALTO</div><div class="stat-val red">${hr}</div></div>
        <div class="stat-card"><div class="stat-label">Riesgo MEDIO</div><div class="stat-val amber">${midIssues.length}</div></div>
      </div>`;

    if(sinContratos){
      html+=`<div class="skip-banner" style="margin:0 0 16px">
        <div class="skip-icon">⚠</div>
        <div class="skip-text"><strong>Personal sin contrato escrito (2.1 = No).</strong> Las preguntas 2.2–2.10 fueron omitidas. La elaboración de contratos individuales para todos los puestos es la acción de mayor prioridad del plan de trabajo.</div>
      </div>`;
    }

    html+=`<div class="sum-section-title">Semáforo por bloque</div>
      <table class="semaforo-table">
        <thead><tr><th>Bloque</th><th style="text-align:center;width:60px">Preguntas</th><th style="text-align:center;width:80px">No / Parcial</th><th style="width:100px">Nivel de riesgo</th></tr></thead>
        <tbody>`;
    BLOCKS.forEach(b=>{
      const r=blockRisk(b);
      const bi=b.qs.filter(q=>!isSkipped(q)&&(answers[q.id]==='no'||answers[q.id]==='parcial')).length;
      html+=`<tr>
        <td>${b.id}. ${esc(b.title)}</td>
        <td style="text-align:center">${b.qs.filter(q=>!isSkipped(q)).length}</td>
        <td style="text-align:center;color:${bi>0?'var(--red-txt)':'var(--muted)'}">${bi}</td>
        <td><span class="badge-risk ${r?'badge-'+r:'badge-none'}">${r?RISK_LABEL[r]:'Sin responder'}</span></td>
      </tr>`;
    });
    html+=`</tbody></table>`;

    if(highIssues.length>0){
      html+=`<div class="sum-section-title" style="color:var(--red-txt)">Contingencias de atención inmediata — Riesgo ALTO</div>`;
      highIssues.forEach(q=>{
        html+=`<div class="issue-item issue-A">
          <div class="issue-num">${esc(q.id)}</div>
          <div class="issue-txt">${esc(q.t)}</div>
          ${notes[q.id]?`<div class="issue-note">↳ ${esc(notes[q.id])}</div>`:''}
        </div>`;
      });
    }
    if(midIssues.length>0){
      html+=`<div class="sum-section-title" style="color:var(--amber-txt)">Contingencias de seguimiento — Riesgo MEDIO</div>`;
      midIssues.forEach(q=>{
        html+=`<div class="issue-item issue-M">
          <div class="issue-num">${esc(q.id)}</div>
          <div class="issue-txt">${esc(q.t)}</div>
          ${notes[q.id]?`<div class="issue-note">↳ ${esc(notes[q.id])}</div>`:''}
        </div>`;
      });
    }

    html+=`<div class="sum-section-title">Paquetería necesaria</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Marque los documentos que aplican al caso específico.</p>
      <div class="doc-grid">`;
    DOCS.forEach((d,i)=>{
      html+=`<div class="doc-row check">
        <input type="checkbox" id="doc${i}" ${docChecks[i]?'checked':''} onchange="setDoc(${i},this.checked)">
        <label for="doc${i}" style="cursor:pointer">${esc(d)}</label>
      </div>`;
    });
    html+=`</div>
      <div class="sum-section-title">Observaciones finales del abogado</div>
      <textarea class="notes-final" placeholder="Contingencia más urgente, estrategia de atención, honorarios estimados, fecha de inicio de trabajos..." onchange="finalNotes=this.value">${esc(finalNotes)}</textarea>
    </div>`;
  }

  html+=`<div class="nav-row">
    <button class="nav-btn" onclick="goBlock(${Math.max(0,block-1)})" ${block===0?'disabled':''}>← Anterior</button>
    <div class="nav-center" id="nav-center">${isSummary?'Diagnóstico final':`Bloque ${BLOCKS[block].id} · ${Math.round((blockAnswered(BLOCKS[block])/BLOCKS[block].qs.length)*100)}% respondido`}</div>
    ${!isSummary
      ?`<button class="nav-btn primary" onclick="goBlock(${block+1})">Siguiente →</button>`
      :`<button class="nav-btn primary" onclick="goBlock(0)">Reiniciar diagnóstico</button>`
    }
  </div>`;

  document.getElementById('app').innerHTML=html;
  document.querySelectorAll('textarea').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const ta=totalAnswered();
  const tq=totalQsCount();
  const pct=tq>0?Math.round((ta/tq)*100):0;
  const fl=document.getElementById('prog-fill');
  const ll=document.getElementById('prog-label');
  const pl=document.getElementById('prog-pct');
  if(fl)fl.style.width=pct+'%';
  if(ll)ll.textContent=`${ta} de ${tq} preguntas atendidas`;
  if(pl)pl.textContent=pct+'%';
  if(!document.getElementById('app').querySelector('.summary-card')){
    const b=BLOCKS[block];
    if(b){
      const bf=document.querySelector('.block-prog-fill');
      if(bf)bf.style.width=Math.round((blockAnswered(b)/b.qs.length)*100)+'%';
      const nc=document.getElementById('nav-center');
      if(nc)nc.textContent=`Bloque ${b.id} · ${Math.round((blockAnswered(b)/b.qs.length)*100)}% respondido`;
    }
  }
}

function goBlock(i){block=i;render()}

function setPersona(val){
  answers['1.1']=val;
  // actualizar clases de las etiquetas
  document.querySelectorAll('.radio-group label').forEach(lbl=>{
    lbl.classList.toggle('selected',lbl.querySelector('input').value===val);
  });
  updateProgress();
}

function setPuesto(id,val){
  puestosData[id]=parseInt(val)||0;
  const tot=totalPuestos();
  const el=document.getElementById('puesto-total');
  if(el)el.innerHTML=`Total: <strong>${tot}</strong> persona${tot!==1?'s':''}`;
  updateProgress();
}

function setAnswer(id,val){
  answers[id]=val;
  // si es pivote 2.1 y cambia a 'no', re-render para mostrar/ocultar skip
  if(id==='2.1'){render();return;}
  updateProgress();
}
function setNote(id,val){notes[id]=val}
function setDoc(i,val){docChecks[i]=val}
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

render();
</script>
</body>
</html>
